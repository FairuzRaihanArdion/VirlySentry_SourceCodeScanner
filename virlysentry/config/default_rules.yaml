    pattern: |-
      (?i)`[^`]*\$_(GET|POST|REQUEST)[^`]*`
    scenario: "Backticks with user input (//rce) executes shell commands."
    recommendation: "Avoid backticks with user input; use escapeshellarg."
    fixed_example: |
      $output = `command " . escapeshellarg($input) . "`";

# INSECURE DESERIALIZATION
  - id: DESER-PY-001
    name: "Insecure Deserialization via pickle.loads on untrusted data"
    category: "Insecure Deserialization"
    owasp: "A08:2021-Software and Data Integrity Failures"
    cwe: "CWE-502"
    severity: CRITICAL
    languages: [python]
    extensions: [".py"]
    pattern: |-
      (?i)pickle\.(loads|load)\s*\(
    scenario: "pickle.loads deserializes untrusted byte streams (//deser), and a crafted payload can execute arbitrary code during unpickling."
    recommendation: "Never unpickle data from an untrusted source. Use a safe format such as JSON, or cryptographically sign/verify the payload before unpickling."
    fixed_example: |
      data = json.loads(payload)

  - id: DESER-PY-002
    name: "Unsafe YAML load allowing arbitrary object construction"
    category: "Insecure Deserialization"
    owasp: "A08:2021-Software and Data Integrity Failures"
    cwe: "CWE-502"
    severity: HIGH
    languages: [python]
    extensions: [".py"]
    pattern: |-
      (?i)yaml\.load\s*\((?!.*Loader\s*=\s*yaml\.SafeLoader)
    scenario: "yaml.load() without an explicit SafeLoader can instantiate arbitrary Python objects from the YAML document (//deser), leading to remote code execution when the file is attacker-influenced."
    recommendation: "Always use yaml.safe_load() or explicitly pass Loader=yaml.SafeLoader."
    fixed_example: |
      data = yaml.safe_load(stream)

  - id: DESER-PHP-001
    name: "PHP Object Injection via unserialize on user input"
    category: "Insecure Deserialization"
    owasp: "A08:2021-Software and Data Integrity Failures"
    cwe: "CWE-502"
    severity: CRITICAL
    languages: [php]
    extensions: [".php"]
    pattern: |-
      (?i)unserialize\s*\(\s*\$_(GET|POST|REQUEST|COOKIE)
    scenario: "User-controlled data is passed to unserialize() (//deser), which can trigger PHP Object Injection and, via a suitable gadget chain, arbitrary code execution."
    recommendation: "Use json_decode()/json_encode() for data interchange instead of PHP native serialization when the source is untrusted."
    fixed_example: |
      $data = json_decode($_POST['payload'], true);

  - id: DESER-JAVA-001
    name: "Insecure Deserialization via ObjectInputStream.readObject on untrusted data"
    category: "Insecure Deserialization"
    owasp: "A08:2021-Software and Data Integrity Failures"
    cwe: "CWE-502"
    severity: CRITICAL
    languages: [java]
    extensions: [".java"]
    pattern: |-
      (?i)new\s+ObjectInputStream\s*\([\s\S]{0,80}?\)\s*\.\s*readObject\s*\(\)
    scenario: "Native Java deserialization is applied to a byte stream (//deser); if that stream can be influenced by an attacker, a crafted object graph using known gadget chains (e.g. Commons Collections) can achieve remote code execution."
    recommendation: "Avoid native Java deserialization for untrusted data. Use a safe data format such as JSON, or a look-ahead deserialization filter (ObjectInputFilter) restricted to an allow-list of classes."
    fixed_example: |
      ObjectInputFilter filter = ObjectInputFilter.Config.createFilter("com.app.dto.*;!*");
      ois.setObjectInputFilter(filter);

  - id: DESER-RUBY-001
    name: "Insecure Deserialization via Marshal.load on untrusted data (Ruby)"
    category: "Insecure Deserialization"
    owasp: "A08:2021-Software and Data Integrity Failures"
    cwe: "CWE-502"
    severity: CRITICAL
    languages: [ruby]
    extensions: [".rb"]
    pattern: |-
      (?i)Marshal\.load\s*\(
    scenario: "Marshal.load reconstructs arbitrary Ruby objects from a byte stream (//deser); a crafted payload from an untrusted source can trigger remote code execution via known gadget chains."
    recommendation: "Never Marshal.load data from an untrusted source. Use JSON for data interchange, or Psych.safe_load for YAML."
    fixed_example: |
      data = JSON.parse(payload)

  - id: DESER-CSHARP-001
    name: "Insecure Deserialization via BinaryFormatter (.NET)"
    category: "Insecure Deserialization"
    owasp: "A08:2021-Software and Data Integrity Failures"
    cwe: "CWE-502"
    severity: CRITICAL
    languages: [csharp]
    extensions: [".cs"]
    pattern: |-
      (?i)new\s+BinaryFormatter\s*\(\s*\)[\s\S]{0,60}?\.Deserialize\s*\(
    scenario: "BinaryFormatter.Deserialize is used on a data stream (//deser); Microsoft has documented this type as inherently unsafe for untrusted input because crafted payloads can execute arbitrary code during deserialization."
    recommendation: "Migrate away from BinaryFormatter entirely; use System.Text.Json or a serializer that does not support type instantiation from the payload."
    fixed_example: |
      var data = JsonSerializer.Deserialize<MyDto>(json);

  - id: DESER-GO-001
    name: "Insecure Deserialization via gob.Decoder on untrusted data"
    category: "Insecure Deserialization"
    owasp: "A08:2021-Software and Data Integrity Failures"
    cwe: "CWE-502"
    severity: HIGH
    languages: [go]
    extensions: [".go"]
    pattern: |-
      (?i)gob\.NewDecoder\s*\([^)]*\)\s*\.Decode\s*\(
    scenario: "gob.Decoder on untrusted data (//deser) may lead to unexpected behavior."
    recommendation: "Use JSON or other safe formats instead of gob for external input."
    fixed_example: |
