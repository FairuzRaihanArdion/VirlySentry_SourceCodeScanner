  - id: INJECT-HTTP-001
    name: "HTTP Response Splitting via user input"
    category: "Injection"
    owasp: "A03:2021-Injection"
    cwe: "CWE-113"
    severity: HIGH
    languages: [python, javascript, typescript, php, java]
    extensions: [".py", ".js", ".ts", ".php", ".java"]
    pattern: |-
      (?i)(Location|redirect).*[\n\r].*request
    scenario: "HTTP response splitting (//response-splitting) enables cache poisoning."
    recommendation: "Validate and sanitize redirect URLs, remove CR/LF characters."
    fixed_example: |
      sanitized_url = url.replace('\n', '').replace('\r', '')
