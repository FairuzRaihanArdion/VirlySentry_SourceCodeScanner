# AUTHENTICATION / SESSION / JWT
  - id: JWT-001
    name: "JWT verification accepts 'none' algorithm or skips signature check"
    category: "Identification and Authentication Failures"
    owasp: "A07:2021-Identification and Authentication Failures"
    cwe: "CWE-347"
    severity: CRITICAL
    languages: [javascript, typescript, python, php, java]
    extensions: [".js", ".ts", ".py", ".php", ".java"]
    pattern: |-
      (?i)(algorithms\s*[:=]\s*\[?\s*["']none["']|verify\s*=\s*False|jwt\.decode\s*\([^)]*verify_signature['"]?\s*:\s*False)
    scenario: "The JWT verification logic allows the 'none' algorithm or explicitly disables signature verification (//jwt-none), which lets an attacker forge a token with arbitrary claims (e.g. an admin role) that the server will accept as valid."
    recommendation: "Explicitly whitelist the expected signing algorithm(s) (e.g. RS256) on every verify call and never accept 'none' or skip signature verification."
    fixed_example: |
      jwt.decode(token, key, algorithms=["RS256"])

  - id: JWT-002
    name: "Hardcoded JWT signing secret"
    category: "Identification and Authentication Failures"
    owasp: "A07:2021-Identification and Authentication Failures"
    cwe: "CWE-321"
    severity: CRITICAL
    languages: [javascript, typescript, python, php, java]
    extensions: [".js", ".ts", ".py", ".php", ".java"]
    pattern: |-
      (?i)jwt\.(sign|encode)\s*\([^)]*["'][A-Za-z0-9_\-!@#$%^&*]{8,}["']
    scenario: "A JWT is signed using a secret literal embedded in source code (//hardcoded-jwt-secret); anyone with source access can forge arbitrary valid tokens, including ones with elevated privileges."
    recommendation: "Load the signing secret/key from an environment variable or secrets manager, and use an asymmetric algorithm (RS256/ES256) where feasible so the verification key differs from the signing key."
    fixed_example: |
      const token = jwt.sign(payload, process.env.JWT_SECRET, { algorithm: "HS256" });

  - id: JWT-003
    name: "JWT with insufficient expiration time"
    category: "Identification and Authentication Failures"
    owasp: "A07:2021-Identification and Authentication Failures"
    cwe: "CWE-613"
    severity: LOW
    languages: [javascript, typescript, python, php, java]
    extensions: [".js", ".ts", ".py", ".php", ".java"]
    pattern: |-
      (?i)expiresIn\s*[:=]\s*["'][0-9]+s["']|experation\s*[:=]\s*[0-9]{1,2}
    scenario: "JWT with short expiration (//weak-session) may increase attack surface."
    recommendation: "Set reasonable expiration times (e.g., 15-60 minutes)."
    fixed_example: |
      jwt.sign(payload, secret, { expiresIn: '1h' })

  - id: JWT-004
    name: "JWT claims contain sensitive data"
    category: "Identification and Authentication Failures"
    owasp: "A07:2021-Identification and Authentication Failures"
    cwe: "CWE-200"
    severity: MEDIUM
    languages: [javascript, typescript, python, php, java]
    extensions: [".js", ".ts", ".py", ".php", ".java"]
    pattern: |-
      (?i)jwt\.(sign|encode)\s*\([^)]*(password|secret|private_key)
    scenario: "JWT contains sensitive data (//info-leak) that could be decoded."
    recommendation: "Store only non-sensitive identifiers in JWT claims."
    fixed_example: |
      jwt.sign({ userId: user.id, role: user.role }, secret)

