# INJECTION VIA EVAL/CODE EXECUTION
  - id: EVAL-JS-001
    name: "Use of eval() / Function constructor on dynamic input"
    category: "Injection"
    owasp: "A03:2021-Injection"
    cwe: "CWE-95"
    severity: CRITICAL
    languages: [javascript, typescript]
    extensions: [".js", ".ts"]
    pattern: |-
      (?i)(^|[^a-zA-Z_])eval\s*\(|new\s+Function\s*\(
    scenario: "eval() or the Function constructor executes a string as code at runtime (//code-injection); if any part of that string is influenced by user input, arbitrary JavaScript execution becomes possible."
    recommendation: "Avoid eval()/Function() entirely. Use JSON.parse() for data and explicit function references instead of dynamically constructed code."
    fixed_example: |
      const data = JSON.parse(jsonString);

  - id: EVAL-PY-001
    name: "Use of eval()/exec() on dynamic input"
    category: "Injection"
    owasp: "A03:2021-Injection"
    cwe: "CWE-95"
    severity: CRITICAL
    languages: [python]
    extensions: [".py"]
    pattern: |-
      (?i)(^|[^a-zA-Z_])(eval|exec)\s*\(
    scenario: "eval()/exec() compiles and runs a string as Python code (//code-injection); any attacker influence over that string leads directly to arbitrary code execution."
    recommendation: "Replace eval()/exec() with a safe, explicit alternative such as ast.literal_eval() for data parsing, or a dispatch dictionary for command routing."
    fixed_example: |
      import ast
      value = ast.literal_eval(user_input)

  - id: EVAL-PHP-001
    name: "Use of eval() on dynamic input (PHP)"
    category: "Injection"
