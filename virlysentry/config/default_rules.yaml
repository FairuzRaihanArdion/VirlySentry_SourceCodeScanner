    languages: [c, cpp]
    extensions: [".c", ".cpp"]
    pattern: |-
      (?i)free\s*\(\s*&[a-zA-Z_]\w*\s*\)
    scenario: "Freeing stack address (//use-after-free) causes undefined behavior."
    recommendation: "Only free heap-allocated memory, not stack variables."
    fixed_example: |
      // free only what was malloc'd

  - id: MEMSAFE-C-005
    name: "Double free vulnerability"
    category: "Memory Safety"
    owasp: "A06:2021-Vulnerable and Outdated Components"
    cwe: "CWE-415"
    severity: HIGH
    languages: [c, cpp]
    extensions: [".c", ".cpp"]
    pattern: |-
      (?i)free\s*\([^)]*\)\s*;\s*free\s*\([^)]*\)
    scenario: "Double free (//use-after-free) leads to memory corruption."
    recommendation: "Set pointer to NULL after free and avoid freeing twice."
    fixed_example: |
      free(ptr);
      ptr = NULL;

  - id: MEMSAFE-CPP-001
