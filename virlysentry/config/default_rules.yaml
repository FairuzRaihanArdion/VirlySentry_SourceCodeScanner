      (?i)(os\.system|os\.popen|subprocess\.(call|run|Popen)\([^)]*shell\s*=\s*True)
    scenario: "User-influenced data may reach a shell command executor (//rce), letting an attacker chain shell metacharacters to execute arbitrary operating system commands."
    recommendation: "Avoid shell=True. Pass the command as a list of arguments to subprocess.run() and never interpolate user input into a shell string."
    fixed_example: |
      subprocess.run(["ping", "-c", "1", host], shell=False, check=True)

