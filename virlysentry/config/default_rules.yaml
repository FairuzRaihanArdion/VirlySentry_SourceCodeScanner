    severity: HIGH
    languages: [python]
    extensions: [".py"]
    pattern: |-
      (?im)^\s*DEBUG\s*=\s*True\s*$
    scenario: "DEBUG=True in a Django settings file leaks stack traces, environment variables, and internal paths to any visitor when an unhandled exception occurs (//debug-exposed)."
    recommendation: "Set DEBUG based on an environment variable and default to False."
    fixed_example: |
      DEBUG = os.environ.get("DJANGO_DEBUG", "False") == "True"

  - id: MISCONF-CORS-001
    name: "Overly permissive CORS policy (wildcard origin)"
    category: "Security Misconfiguration"
    owasp: "A05:2021-Security Misconfiguration"
    cwe: "CWE-942"
    severity: MEDIUM
    languages: [python, javascript, typescript, php]
    extensions: [".py", ".js", ".ts", ".php"]
    pattern: |-
      (?i)(Access-Control-Allow-Origin|cors\(\s*\{\s*origin)\s*[:=,]?\s*["'\*]\*
    scenario: "A wildcard CORS origin allows any website to make authenticated cross-origin requests to this API (//cors-wildcard), which can lead to sensitive data exfiltration when combined with credentialed requests."
    recommendation: "Restrict Access-Control-Allow-Origin to an explicit allow-list of trusted origins."
    fixed_example: |
      response.headers["Access-Control-Allow-Origin"] = "https://trusted.example.com"

  - id: MISCONF-CORS-002
    name: "CORS wildcard origin combined with credentials allowed"
    category: "Security Misconfiguration"
    owasp: "A05:2021-Security Misconfiguration"
    cwe: "CWE-942"
    severity: HIGH
    languages: [python, javascript, typescript, php]
    extensions: [".py", ".js", ".ts", ".php"]
    pattern: |-
      (?i)Access-Control-Allow-Credentials\s*[:=]\s*["']?true["']?[\s\S]{0,200}?Access-Control-Allow-Origin\s*[:=]\s*["']?\*
    scenario: "Allow-Credentials:true is paired with a wildcard Allow-Origin (//cors-credentials-wildcard); while most browsers reject this exact combination, misconfigured proxies or reflected-origin logic can effectively recreate it, letting any origin make authenticated requests and read the response, including session cookies' effects."
    recommendation: "Never combine wildcard origins with credentialed CORS. Reflect only an explicitly allow-listed origin when Allow-Credentials is true."
    fixed_example: |
      if origin in ALLOWED_ORIGINS:
          response.headers["Access-Control-Allow-Origin"] = origin
          response.headers["Access-Control-Allow-Credentials"] = "true"

  - id: MISCONF-COOKIE-001
    name: "Session cookie missing Secure/HttpOnly flags"
    category: "Security Misconfiguration"
    owasp: "A05:2021-Security Misconfiguration"
    cwe: "CWE-614"
    severity: MEDIUM
    languages: [javascript, typescript, python, php]
    extensions: [".js", ".ts", ".py", ".php"]
    pattern: |-
      (?i)(set-cookie|setCookie|session\.cookie)[^\n]*(?!.*(Secure|HttpOnly))
    scenario: "A session cookie is set without the Secure and HttpOnly flags (//insecure-cookie), leaving it exposed to interception over plaintext HTTP and to theft via client-side script injection (XSS)."
    recommendation: "Set both HttpOnly and Secure (and SameSite) attributes on any cookie carrying session or authentication data."
    fixed_example: |
      res.cookie("session_id", token, { httpOnly: true, secure: true, sameSite: "strict" });

  - id: MISCONF-COOKIE-002
    name: "SameSite=None cookie without Secure flag"
    category: "Security Misconfiguration"
    owasp: "A05:2021-Security Misconfiguration"
    cwe: "CWE-1275"
    severity: MEDIUM
    languages: [javascript, typescript, python, php]
    extensions: [".js", ".ts", ".py", ".php"]
    pattern: |-
      (?i)SameSite\s*[:=]\s*["']?None["']?(?!.{0,60}Secure)
    scenario: "SameSite=None is set without the Secure attribute (//samesite-none-insecure); modern browsers reject such cookies, but the misconfiguration usually signals the cookie is unintentionally exposed to cross-site contexts without adequate transport protection."
    recommendation: "Always pair SameSite=None with Secure, and confirm cross-site cookie use is actually required before relaxing SameSite."
    fixed_example: |
      res.cookie("token", value, { sameSite: "none", secure: true });

  - id: MISCONF-CSP-001
    name: "Missing or overly permissive Content-Security-Policy"
    category: "Security Misconfiguration"
    owasp: "A05:2021-Security Misconfiguration"
    cwe: "CWE-1021"
    severity: LOW
    languages: [javascript, typescript, python, php, generic]
    extensions: [".js", ".ts", ".py", ".php", ".conf"]
    pattern: |-
      (?i)Content-Security-Policy[^\n]*(unsafe-inline|unsafe-eval|\*)
    scenario: "The Content-Security-Policy header allows unsafe-inline, unsafe-eval, or a wildcard source (//weak-csp), which significantly weakens CSP's ability to mitigate XSS by permitting inline or arbitrary-origin script execution."
    recommendation: "Remove unsafe-inline/unsafe-eval and scope each directive to an explicit list of trusted origins; use nonces or hashes for any necessary inline scripts."
    fixed_example: |
      Content-Security-Policy: script-src 'self' 'nonce-<random>'

  - id: MISCONF-CLICKJACK-001
    name: "Missing clickjacking protection (X-Frame-Options / frame-ancestors)"
    category: "Security Misconfiguration"
    owasp: "A05:2021-Security Misconfiguration"
    cwe: "CWE-1021"
    severity: LOW
    languages: [python, javascript, typescript, php, java, generic]
    extensions: [".py", ".js", ".ts", ".php", ".java", ".conf"]
    pattern: |-
      (?i)(X-Frame-Options|frame-ancestors)
    scenario: "This signature flags files where X-Frame-Options or a CSP frame-ancestors directive is referenced; confirm one of them is actually being *set* on every HTML response (//clickjacking) — its absence lets an attacker embed the page in a hidden iframe and trick users into clicking UI elements."
    recommendation: "Set X-Frame-Options: DENY (or SAMEORIGIN) and/or Content-Security-Policy: frame-ancestors 'none' on all HTML responses that don't need to be framed."
    fixed_example: |
      response.headers["X-Frame-Options"] = "DENY"

  - id: MISCONF-DOCKERROOT-001
    name: "Dockerfile does not switch away from root user"
    category: "Security Misconfiguration"
    owasp: "A05:2021-Security Misconfiguration"
    cwe: "CWE-250"
    severity: LOW
    languages: [generic]
    extensions: ["Dockerfile", ".dockerfile"]
    pattern: |-
      (?im)^FROM\s+\S+(?!(.|\n)*^\s*USER\s+(?!root)\S+)
    scenario: "The container image does not appear to declare a non-root USER (//container-root), so the process runs as root by default; a container escape or code-execution bug in the app then grants the attacker root privileges inside (and potentially outside) the container."
    recommendation: "Create a dedicated non-root user in the Dockerfile and switch to it with USER before the application's entrypoint runs."
    fixed_example: |
      RUN useradd -m appuser
      USER appuser

  - id: MISCONF-S3PUBLIC-001
    name: "Cloud storage bucket policy grants public read/write access"
    category: "Security Misconfiguration"
    owasp: "A05:2021-Security Misconfiguration"
    cwe: "CWE-284"
    severity: HIGH
    languages: [generic]
    extensions: [".tf", ".json", ".yaml", ".yml"]
    pattern: |-
      (?i)("Principal"\s*:\s*"\*"|Principal\s*=\s*"\*")[\s\S]{0,200}?("Effect"\s*:\s*"Allow"|Effect\s*=\s*"Allow")
    scenario: "An IAM/bucket policy grants access to Principal '*' with Effect Allow (//public-bucket-policy), which can expose stored objects (and, if write is included, allow tampering) to any unauthenticated party on the internet."
    recommendation: "Scope the Principal to specific accounts/roles that need access, and use bucket-level 'block public access' settings as defense in depth."
    fixed_example: |
      Principal = { AWS = "arn:aws:iam::123456789012:role/app-role" }

  - id: MISCONF-DEBUGENDPOINT-001
    name: "Debug/actuator endpoint exposed without access restriction (Spring Boot)"
    category: "Security Misconfiguration"
    owasp: "A05:2021-Security Misconfiguration"
    cwe: "CWE-215"
    severity: MEDIUM
    languages: [generic]
    extensions: [".yml", ".yaml", ".properties"]
    pattern: |-
      (?i)management\.endpoints\.web\.exposure\.include\s*[:=]\s*["']?\*
    scenario: "All Spring Boot Actuator endpoints are exposed over HTTP (//actuator-exposed), including ones like /env, /heapdump, and /shutdown that can leak secrets, memory contents, or allow denial of service if reachable by an attacker."
    recommendation: "Expose only the specific actuator endpoints actually needed (e.g. health, info) and require authentication for the rest."
    fixed_example: |
      management.endpoints.web.exposure.include=health,info

  # //ssti
  - id: SSTI-PY-002
    name: "Server-Side Template Injection via string-built template"
    category: "Injection"
    owasp: "A03:2021-Injection"
    cwe: "CWE-1336"
    severity: CRITICAL
    languages: [python]
    extensions: [".py"]
    pattern: |-
      (?i)Template\s*\(\s*[f]?["'].*\{.*request\.
    scenario: "A Jinja2 Template object is constructed from a string that embeds request data (//ssti), allowing an attacker to inject template syntax and achieve remote code execution."
    recommendation: "Never build template source strings from user input; load templates from static files and pass user data only as render context."
    fixed_example: |
      template = env.get_template("page.html")
      template.render(name=request.args.get("name"))

  - id: SSTI-JAVA-001
    name: "Spring Expression Language (SpEL) Injection"
    category: "Injection"
    owasp: "A03:2021-Injection"
    cwe: "CWE-917"
    severity: CRITICAL
    languages: [java]
    extensions: [".java"]
    pattern: |-
      (?i)(new\s+SpelExpressionParser\(\)|ExpressionParser)[\s\S]{0,120}?\.parseExpression\s*\([^)]*getParameter\s*\(
    scenario: "A Spring Expression Language string built from an HTTP request parameter is parsed and evaluated (//ssti), which allows an attacker to inject arbitrary SpEL expressions and typically achieve remote code execution."
    recommendation: "Never evaluate SpEL expressions built from untrusted input. If dynamic expressions are required, use a restricted SimpleEvaluationContext with a strict allow-list."
    fixed_example: |
      // Avoid evaluating user-supplied strings as SpEL at all; use fixed, pre-defined expressions only.

  # //broken-access-control
  - id: ACCESS-001
    name: "Missing authentication/authorization check before sensitive action"
    category: "Broken Access Control"
    owasp: "A01:2021-Broken Access Control"
    cwe: "CWE-862"
    severity: INFO
    languages: [python, javascript, typescript, php, java, go, ruby, csharp]
    extensions: [".py", ".js", ".ts", ".php", ".java", ".go", ".rb", ".cs"]
    pattern: |-
      (?i)(def|function|func|public\s+\w+)\s+(delete|remove|admin|update)_?\w*\s*\(
    scenario: "A function performing a destructive or administrative action was found; confirm it enforces an authentication/authorization check before executing (//access-control), otherwise it may allow privilege escalation or unauthorized data modification."
    recommendation: "Add an explicit authorization check (role/permission verification) at the top of the handler before performing the sensitive operation."
    fixed_example: |
      if not current_user.has_permission("delete_resource"):
          abort(403)

  - id: MASSASSIGN-001
    name: "Mass Assignment via unfiltered request body bound to model"
    category: "Broken Access Control"
    owasp: "A01:2021-Broken Access Control"
    cwe: "CWE-915"
    severity: MEDIUM
    languages: [ruby, javascript, typescript, java, csharp]
    extensions: [".rb", ".js", ".ts", ".java", ".cs"]
    pattern: |-
      (?i)(\.create\s*\(\s*(params|req\.body)\s*\)|\.update\s*\(\s*(params|req\.body)\s*\)|Model\.new\s*\(\s*params\s*\))
    scenario: "A full, unfiltered request body/params object is bound directly onto a model's create/update call (//mass-assignment), which lets an attacker set fields that were never intended to be user-controllable, such as 'role' or 'is_admin'."
    recommendation: "Explicitly whitelist the permitted attributes (e.g. Rails strong parameters, or a DTO with only the intended fields) before passing data into the model."
    fixed_example: |
      user.update(permitted_params.slice(:name, :email))

  - id: IDOR-001
    name: "Potential Insecure Direct Object Reference via ID from request without ownership check"
    category: "Broken Access Control"
    owasp: "A01:2021-Broken Access Control"
    cwe: "CWE-639"
    severity: INFO
    languages: [python, javascript, typescript, php, java, ruby]
    extensions: [".py", ".js", ".ts", ".php", ".java", ".rb"]
    pattern: |-
      (?i)(find|findById|find_by_id|get)\s*\(\s*(request\.(args|params)|req\.params|\$_(GET|POST))
    scenario: "A record is fetched using an identifier taken directly from the request (//idor); confirm the handler also verifies the current user actually owns or is authorized to access that specific record, otherwise any authenticated user could enumerate and access other users' data."
    recommendation: "After loading the record, explicitly check that it belongs to (or is otherwise accessible by) the requesting user before returning or modifying it."
    fixed_example: |
      record = Order.find(order_id)
      abort(403) unless record.user_id == current_user.id

  - id: CSRF-001
    name: "State-changing route without apparent CSRF token verification"
    category: "Broken Access Control"
    owasp: "A01:2021-Broken Access Control"
    cwe: "CWE-352"
    severity: MEDIUM
    languages: [python, php, java]
    extensions: [".py", ".php", ".java"]
    pattern: |-
      (?i)@(app\.route|PostMapping|RequestMapping)\([^)]*method[s]?\s*=\s*\[?["']?(POST|PUT|DELETE)
    scenario: "A state-changing (POST/PUT/DELETE) endpoint was found; confirm the framework's CSRF protection is enabled for it (//csrf), otherwise an attacker can trick an authenticated user's browser into submitting the request from a malicious page."
    recommendation: "Enable and require CSRF token validation on all state-changing routes (e.g. Flask-WTF CSRFProtect, Spring Security CSRF, or a custom double-submit cookie)."
    fixed_example: |
      csrf = CSRFProtect(app)  # Flask-WTF, enabled globally

  - id: IDOR-GO-001
    name: "Potential IDOR via record lookup from route parameter without ownership check (Go)"
    category: "Broken Access Control"
    owasp: "A01:2021-Broken Access Control"
    cwe: "CWE-639"
    severity: INFO
    languages: [go]
    extensions: [".go"]
    pattern: |-
      (?i)(mux\.Vars\(r\)|c\.Param\s*\()\s*\[?"?id"?\]?[\s\S]{0,120}?(FindByID|GetByID|First\(\&)
    scenario: "A record is looked up using an identifier taken directly from the route (//idor); confirm the handler also verifies the requesting user is authorized to access that specific record, otherwise any authenticated caller could enumerate other users' data by ID."
    recommendation: "After loading the record, explicitly verify it belongs to (or is otherwise accessible by) the requesting user before returning or modifying it."
    fixed_example: |
      if record.OwnerID != currentUser.ID { http.Error(w, "forbidden", http.StatusForbidden); return }

  # //code-injection-eval
  - id: EVAL-JS-001
    name: "Use of eval() / Function constructor on dynamic input"
    category: "Injection"
    owasp: "A03:2021-Injection"
    cwe: "CWE-95"
    severity: CRITICAL
    languages: [javascript, typescript]
    extensions: [".js", ".ts"]
    pattern: |-
      (?i)(^|[^a-zA-Z_])eval\s*\(|new\s+Function\s*\(
    scenario: "eval() or the Function constructor executes a string as code at runtime (//code-injection); if any part of that string is influenced by user input, arbitrary JavaScript execution becomes possible."
    recommendation: "Avoid eval()/Function() entirely. Use JSON.parse() for data and explicit function references instead of dynamically constructed code."
    fixed_example: |
      const data = JSON.parse(jsonString);

  - id: EVAL-PY-001
    name: "Use of eval()/exec() on dynamic input"
    category: "Injection"
    owasp: "A03:2021-Injection"
    cwe: "CWE-95"
    severity: CRITICAL
    languages: [python]
    extensions: [".py"]
    pattern: |-
      (?i)(^|[^a-zA-Z_])(eval|exec)\s*\(
    scenario: "eval()/exec() compiles and runs a string as Python code (//code-injection); any attacker influence over that string leads directly to arbitrary code execution."
    recommendation: "Replace eval()/exec() with a safe, explicit alternative such as ast.literal_eval() for data parsing, or a dispatch dictionary for command routing."
    fixed_example: |
      import ast
      value = ast.literal_eval(user_input)

  - id: PROTOPOLLUTION-001
    name: "Prototype Pollution via unguarded deep merge of user input"
    category: "Injection"
    owasp: "A03:2021-Injection"
    cwe: "CWE-1321"
    severity: HIGH
    languages: [javascript, typescript]
    extensions: [".js", ".ts"]
    pattern: |-
      (?i)(_\.merge|deepmerge|Object\.assign)\s*\(\s*[^,]+,\s*(req\.(body|query)|JSON\.parse)
    scenario: "A deep-merge utility combines an application object with an untrusted, attacker-controlled object (//prototype-pollution); a payload containing '__proto__' can pollute Object.prototype, potentially leading to denial of service or, in some code paths, remote code execution."
    recommendation: "Use a merge utility with prototype-pollution protection (or a version patched against it), and explicitly strip/reject '__proto__', 'constructor', and 'prototype' keys from untrusted input before merging."
    fixed_example: |
      const safeInput = sanitizeKeys(req.body);
      const merged = _.merge({}, defaults, safeInput);

  - id: REDOS-001
    name: "Potential Regular Expression Denial of Service (ReDoS) pattern"
    category: "Denial of Service"
    owasp: "A05:2021-Security Misconfiguration"
    cwe: "CWE-1333"
    severity: MEDIUM
    languages: [javascript, typescript, python, php, java]
    extensions: [".js", ".ts", ".py", ".php", ".java"]
    pattern: |-
      (\([^()]*[+*]\)[+*]|\([^()]*[+*][^()]*\|[^()]*[+*]\)[+*])
    scenario: "A regular expression contains nested quantifiers or overlapping alternation with repetition (//redos), a pattern known to cause catastrophic backtracking; a crafted input string can make matching take exponential time and exhaust CPU on a single request."
    recommendation: "Rewrite the regex to avoid nested/ambiguous quantifiers, add an input length cap before matching, or use a non-backtracking regex engine (e.g. RE2) for untrusted input."
    fixed_example: |
      // Rewrite (a+)+ style patterns to a single bounded quantifier, e.g. a{1,100}

  - id: VULN-DEP-001
    name: "Known-vulnerable dependency version pinned"
    category: "Vulnerable and Outdated Components"
    owasp: "A06:2021-Vulnerable and Outdated Components"
    cwe: "CWE-1104"
    severity: HIGH
    languages: [generic]
    extensions: [".txt", ".json", ".lock", ".toml"]
    pattern: |-
      (?i)"?(lodash)"?\s*[:=]\s*"?[\^~]?4\.17\.(0|1[0-9]|20)\b|"?(log4j-core)"?\s*[:=]\s*"?2\.(0|1[0-6])\.
    scenario: "The manifest pins a package version with a publicly disclosed CVE (//vulnerable-dependency) (e.g. lodash prototype pollution, Log4Shell), leaving the application exposed to known, weaponized exploits."
    recommendation: "Upgrade the dependency to a patched version and enable automated dependency scanning (e.g. Dependabot/Snyk) in CI/CD."
    fixed_example: |
      "lodash": "^4.17.21"

  - id: CRLF-001
    name: "CRLF injection into HTTP response headers (HTTP Response Splitting)"
    category: "Injection"
    owasp: "A03:2021-Injection"
    cwe: "CWE-113"
    severity: MEDIUM
    languages: [python, javascript, typescript, php, java]
    extensions: [".py", ".js", ".ts", ".php", ".java"]
    pattern: |-
      (?i)(setHeader|set_header|header)\s*\(\s*[^)]*\+\s*(request\.(args|form)|req\.(query|body)|\$_(GET|POST))
    scenario: "A response header value is built by concatenating user input (//crlf-injection); if the input contains CR/LF sequences, an attacker can inject additional headers or split the response, enabling cache poisoning, session fixation, or reflected XSS."
    recommendation: "Strip or reject CR/LF characters from any value placed into a header, and prefer framework APIs that automatically encode header values."
    fixed_example: |
      safe_value = value.replace("\r", "").replace("\n", "")
      response.headers["X-Custom"] = safe_value

  - id: XMLBOMB-001
    name: "XML parsed without entity expansion limits (Billion Laughs / XML bomb)"
    category: "Denial of Service"
    owasp: "A05:2021-Security Misconfiguration"
    cwe: "CWE-776"
    severity: MEDIUM
    languages: [python, java, php]
    extensions: [".py", ".java", ".php"]
    pattern: |-
      (?i)(expat|SAXParser|DocumentBuilder)[\s\S]{0,150}?\.parse\s*\((?!.{0,300}(entityExpansionLimit|resolve_entities\s*=\s*False))
    scenario: "An XML parser is used without an explicit entity-expansion limit (//xml-bomb); a maliciously crafted document using nested entity definitions can force the parser to expand to gigabytes of data in memory, exhausting resources and causing denial of service."
    recommendation: "Configure the parser with a strict entity-expansion limit and disable DTD processing entirely for untrusted XML."
    fixed_example: |
      factory.setFeature("http://apache.org/xml/features/disallow-doctype-decl", true);

  # //authentication-session-jwt
  - id: JWT-001
    name: "JWT verification accepts 'none' algorithm or skips signature check"
    category: "Identification and Authentication Failures"
    owasp: "A07:2021-Identification and Authentication Failures"
    cwe: "CWE-347"
    severity: CRITICAL
    languages: [javascript, typescript, python, php, java]
    extensions: [".js", ".ts", ".py", ".php", ".java"]
    pattern: |-
      (?i)(algorithms\s*[:=]\s*\[?\s*["']none["']|verify\s*=\s*False|jwt\.decode\s*\([^)]*verify_signature['"]?\s*:\s*False)
    scenario: "The JWT verification logic allows the 'none' algorithm or explicitly disables signature verification (//jwt-none), which lets an attacker forge a token with arbitrary claims (e.g. an admin role) that the server will accept as valid."
    recommendation: "Explicitly whitelist the expected signing algorithm(s) (e.g. RS256) on every verify call and never accept 'none' or skip signature verification."
    fixed_example: |
      jwt.decode(token, key, algorithms=["RS256"])

  - id: JWT-002
    name: "Hardcoded JWT signing secret"
    category: "Identification and Authentication Failures"
    owasp: "A07:2021-Identification and Authentication Failures"
    cwe: "CWE-321"
    severity: CRITICAL
    languages: [javascript, typescript, python, php, java]
    extensions: [".js", ".ts", ".py", ".php", ".java"]
    pattern: |-
      (?i)jwt\.(sign|encode)\s*\([^)]*["'][A-Za-z0-9_\-!@#$%^&*]{8,}["']
    scenario: "A JWT is signed using a secret literal embedded in source code (//hardcoded-jwt-secret); anyone with source access can forge arbitrary valid tokens, including ones with elevated privileges."
    recommendation: "Load the signing secret/key from an environment variable or secrets manager, and use an asymmetric algorithm (RS256/ES256) where feasible so the verification key differs from the signing key."
    fixed_example: |
      const token = jwt.sign(payload, process.env.JWT_SECRET, { algorithm: "HS256" });

  - id: AUTH-DEFAULTCREDS-001
    name: "Hardcoded default administrative credentials"
    category: "Identification and Authentication Failures"
    owasp: "A07:2021-Identification and Authentication Failures"
    cwe: "CWE-798"
    severity: CRITICAL
    languages: [python, javascript, typescript, php, java, generic]
    extensions: [".py", ".js", ".ts", ".php", ".java", ".yaml", ".yml", ".json", ".env"]
    pattern: |-
      (?i)(username|user)\s*[:=]\s*["']admin["'][\s\S]{0,80}?(password|passwd|pwd)\s*[:=]\s*["'](admin|password|123456|changeme)["']
    scenario: "A default admin/admin-style credential pair is hardcoded in source or config (//default-creds), which is one of the most commonly exploited weaknesses in automated attacks and internet-wide scanning."
    recommendation: "Remove default credentials entirely; require an administrator to set a strong password on first run, and enforce this via a setup flow rather than a shipped default."
    fixed_example: |
      # Force password set on first boot instead of shipping a default value

  - id: AUTH-RATELIMIT-001
    name: "Authentication endpoint without apparent rate limiting"
    category: "Identification and Authentication Failures"
    owasp: "A07:2021-Identification and Authentication Failures"
    cwe: "CWE-307"
    severity: MEDIUM
    languages: [python, javascript, typescript, php, java]
    extensions: [".py", ".js", ".ts", ".php", ".java"]
    pattern: |-
      (?i)@(app\.route|PostMapping)\s*\(\s*["'][^"']*(login|signin|authenticate)[^"']*["']
    scenario: "A login/authentication route was found; confirm it is protected by rate limiting or account lockout (//brute-force), otherwise it is susceptible to credential-stuffing and brute-force password guessing attacks."
    recommendation: "Apply rate limiting (per-IP and per-account) and progressive delays or lockouts to authentication endpoints, and consider CAPTCHA after repeated failures."
    fixed_example: |
      @limiter.limit("5 per minute")
      @app.route("/login", methods=["POST"])

  - id: HOSTHEADER-001
    name: "Host header used to build absolute URLs without validation"
    category: "Security Misconfiguration"
    owasp: "A05:2021-Security Misconfiguration"
    cwe: "CWE-644"
    severity: MEDIUM
    languages: [python, javascript, typescript, php, java]
    extensions: [".py", ".js", ".ts", ".php", ".java"]
    pattern: |-
      (?i)(request\.host|req\.headers\.host|\$_SERVER\['HTTP_HOST'\]|getHeader\s*\(\s*["']Host["']\s*\))[\s\S]{0,80}?(password.?reset|reset.?link|http)
    scenario: "The Host header is trusted and used to build an absolute URL, e.g. inside a password-reset email (//host-header-injection); an attacker can send a request with a forged Host header, causing the generated link to point to an attacker-controlled domain and capture reset tokens from victims."
    recommendation: "Use a fixed, server-side-configured base URL for generating links instead of trusting the incoming Host header."
    fixed_example: |
      reset_link = f"{settings.APP_BASE_URL}/reset?token={token}"

  - id: AUTH-TIMINGATTACK-001
    name: "Non-constant-time comparison of secret values"
    category: "Cryptographic Failures"
    owasp: "A02:2021-Cryptographic Failures"
    cwe: "CWE-208"
    severity: LOW
    languages: [python, javascript, typescript, php, java]
    extensions: [".py", ".js", ".ts", ".php", ".java"]
    pattern: |-
      (?i)(if\s*\(\s*\w*(token|secret|hmac|signature)\w*\s*==|===\s*\w*(token|secret|hmac|signature))
    scenario: "A secret, token, or signature value appears to be compared with a standard equality operator (//timing-attack); such comparisons short-circuit on the first differing byte, letting a remote attacker recover the correct value byte-by-byte via response-time measurements."
    recommendation: "Use a constant-time comparison function (e.g. hmac.compare_digest, crypto.timingSafeEqual, MessageDigest.isEqual) for any secret or signature comparison."
    fixed_example: |
      import hmac
      if hmac.compare_digest(provided_token, expected_token):

  - id: AUTH-SESSIONFIXATION-001
    name: "Session ID not regenerated after successful login"
    category: "Identification and Authentication Failures"
    owasp: "A07:2021-Identification and Authentication Failures"
    cwe: "CWE-384"
    severity: MEDIUM
    languages: [python, php, java]
    extensions: [".py", ".php", ".java"]
    pattern: |-
      (?i)(login_user|session\[.user_id.\]\s*=|\$_SESSION\['user'\]\s*=)(?!.{0,150}(regenerate|session_regenerate_id|changeSessionId))
    scenario: "A user's authenticated session appears to be established without regenerating the session identifier (//session-fixation), which lets an attacker who fixed a victim's session ID before login reuse that same ID to hijack the now-authenticated session."
    recommendation: "Regenerate the session identifier immediately after a successful authentication, before storing any authenticated session state."
    fixed_example: |
      session_regenerate_id(true);
      $_SESSION['user'] = $userId;

  # //file-upload
  - id: UPLOAD-001
    name: "File upload without extension/content-type validation"
    category: "Security Misconfiguration"
    owasp: "A05:2021-Security Misconfiguration"
    cwe: "CWE-434"
    severity: HIGH
    languages: [python, javascript, typescript, php, java]
    extensions: [".py", ".js", ".ts", ".php", ".java"]
    pattern: |-
      (?i)(save|move_uploaded_file|writeFile|multer\(\s*\{)[\s\S]{0,60}?(request\.files|\$_FILES|req\.file)
    scenario: "An uploaded file is saved to disk without apparent validation of its extension, MIME type, or content (//unrestricted-upload); an attacker can upload an executable script (e.g. a .php or .jsp web shell) into a web-accessible directory and achieve remote code execution."
    recommendation: "Validate the file's extension and actual content type against an allow-list, store uploads outside the web root (or with execution disabled), and rename files to a generated identifier rather than trusting the client-supplied filename."
    fixed_example: |
      if not filename.lower().endswith((".png", ".jpg", ".pdf")):
          abort(400)
      safe_name = f"{uuid.uuid4()}{ext}"

  - id: UPLOAD-TEMPFILE-001
    name: "Insecure temporary file creation (predictable name / race condition)"
    category: "Security Misconfiguration"
    owasp: "A05:2021-Security Misconfiguration"
    cwe: "CWE-377"
    severity: MEDIUM
    languages: [python, php, java, c, cpp]
    extensions: [".py", ".php", ".java", ".c", ".cpp"]
    pattern: |-
      (?i)(tempnam\s*\(|tmpnam\s*\(|/tmp/["'][a-zA-Z0-9_\-]*["']\s*\+)
    scenario: "A temporary file is created with a predictable name or via a function known to be subject to race conditions (//insecure-tempfile); a local attacker can pre-create or symlink the predicted path to read, overwrite, or redirect writes to an arbitrary file."
    recommendation: "Use a secure temp-file API that atomically creates the file with a random name and exclusive access (e.g. tempfile.mkstemp in Python, File.createTempFile in Java with restricted permissions)."
    fixed_example: |
      fd, path = tempfile.mkstemp()

  # //c-native-memory-safety
  - id: MEMSAFE-C-001
    name: "Use of unsafe C string function prone to buffer overflow"
    category: "Memory Safety"
    owasp: "A06:2021-Vulnerable and Outdated Components"
    cwe: "CWE-120"
    severity: HIGH
    languages: [c, cpp]
    extensions: [".c", ".cpp", ".h", ".hpp"]
    pattern: |-
      (?i)\b(strcpy|strcat|gets|sprintf)\s*\(
    scenario: "An unbounded C string function is used (//buffer-overflow); if the source data can exceed the destination buffer's size, this can corrupt adjacent memory and, in the worst case, allow arbitrary code execution via stack/heap overwrite."
    recommendation: "Use bounded equivalents (strncpy, strncat, fgets, snprintf) and always pass the destination buffer size explicitly."
    fixed_example: |
      snprintf(dest, sizeof(dest), "%s", src);

  - id: MEMSAFE-C-002
    name: "Format string vulnerability via non-literal format argument"
    category: "Memory Safety"
    owasp: "A06:2021-Vulnerable and Outdated Components"
    cwe: "CWE-134"
    severity: HIGH
    languages: [c, cpp]
    extensions: [".c", ".cpp"]
    pattern: |-
      (?i)\bprintf\s*\(\s*[a-zA-Z_]\w*\s*\)
    scenario: "printf() (or a variant) is called with a variable as the format string instead of a literal (//format-string), so if that variable's value is attacker-controlled it can be used to leak stack memory or, via %n, write arbitrary memory."
    recommendation: "Always use a constant format string, passing the variable as an argument instead: printf(\"%s\", var)."
    fixed_example: |
      printf("%s", user_supplied_string);

  - id: MEMSAFE-C-003
    name: "Use of malloc result without size validation (potential integer overflow)"
    category: "Memory Safety"
    owasp: "A06:2021-Vulnerable and Outdated Components"
    cwe: "CWE-190"
    severity: MEDIUM
    languages: [c, cpp]
    extensions: [".c", ".cpp"]
    pattern: |-
      (?i)malloc\s*\(\s*\w+\s*\*\s*\w+\s*\)
    scenario: "A malloc() size is computed by multiplying two variables without an overflow check (//integer-overflow); if the multiplication wraps around, the allocation can be much smaller than intended, leading to a subsequent heap buffer overflow when the code writes based on the original (unwrapped) size."
    recommendation: "Use an overflow-checked allocation helper (e.g. calloc with built-in overflow checks, or manual bounds validation) instead of a raw multiplication inside malloc()."
    fixed_example: |
      if (count > SIZE_MAX / size) { /* handle error */ }
      ptr = malloc(count * size);

  - id: MEMSAFE-C-004
    name: "Use-after-free risk: pointer used after free() without reassignment"
    category: "Memory Safety"
    owasp: "A06:2021-Vulnerable and Outdated Components"
    cwe: "CWE-416"
    severity: HIGH
    languages: [c, cpp]
    extensions: [".c", ".cpp"]
    pattern: |-
      (?i)free\s*\(\s*(\w+)\s*\)\s*;(?!\s*\1\s*=\s*NULL)
    scenario: "A pointer is freed but not immediately set to NULL (//use-after-free); if the same pointer is dereferenced or freed again later in the function, this can corrupt the heap or be exploited by an attacker who controls the freed memory's reallocation."
    recommendation: "Set the pointer to NULL immediately after free() and check for NULL before any subsequent use, to turn potential use-after-free bugs into safe no-ops."
    fixed_example: |
      free(ptr);
      ptr = NULL;

  # //graphql-api
  - id: GRAPHQL-INTROSPECTION-001
    name: "GraphQL introspection enabled without environment check"
    category: "Security Misconfiguration"
    owasp: "A05:2021-Security Misconfiguration"
    cwe: "CWE-200"
    severity: LOW
    languages: [javascript, typescript, python]
    extensions: [".js", ".ts", ".py"]
    pattern: |-
      (?i)introspection\s*:\s*true
    scenario: "GraphQL introspection is explicitly enabled (//graphql-introspection); in a production deployment this lets any client enumerate the entire schema, including internal-only types, fields, and mutations, which aids an attacker in mapping the API's attack surface."
    recommendation: "Disable introspection in production environments, gating it behind an environment-variable check (enabled only in development)."
    fixed_example: |
      introspection: process.env.NODE_ENV !== "production"

  - id: GRAPHQL-DEPTHLIMIT-001
    name: "GraphQL server without apparent query depth/complexity limiting"
    category: "Denial of Service"
    owasp: "A05:2021-Security Misconfiguration"
    cwe: "CWE-770"
    severity: MEDIUM
    languages: [javascript, typescript, python]
    extensions: [".js", ".ts", ".py"]
    pattern: |-
      (?i)new\s+(ApolloServer|GraphQLSchema)\s*\(
    scenario: "A GraphQL server is instantiated; confirm query depth/complexity limiting is configured (//graphql-dos), otherwise a deeply nested or highly repetitive query can force the server to perform exponential work and exhaust resources."
    recommendation: "Add a query complexity/depth-limiting validation rule (e.g. graphql-depth-limit, graphql-cost-analysis) to reject excessively expensive queries."
    fixed_example: |
      validationRules: [depthLimit(6)]

  - id: GRAPHQL-BATCHING-001
    name: "GraphQL/JSON-RPC batch requests accepted without a limit"
    category: "Denial of Service"
    owasp: "A05:2021-Security Misconfiguration"
    cwe: "CWE-770"
    severity: LOW
    languages: [javascript, typescript, python]
    extensions: [".js", ".ts", ".py"]
    pattern: |-
      (?i)Array\.isArray\s*\(\s*req\.body\s*\)[\s\S]{0,120}?(map|forEach)\s*\(
    scenario: "The endpoint accepts an array (batch) of GraphQL/JSON-RPC operations in a single request without an apparent cap on batch size (//batching-dos), which lets an attacker submit thousands of operations in one HTTP call to bypass per-request rate limits and exhaust server resources."
    recommendation: "Enforce a maximum batch size per request and count each batched operation against the caller's rate limit."
    fixed_example: |
      if (Array.isArray(req.body) && req.body.length > MAX_BATCH) return res.status(400).end();

