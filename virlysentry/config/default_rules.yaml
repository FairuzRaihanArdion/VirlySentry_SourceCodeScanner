    scenario: "Sensitive data in API response (//info-leak) could expose credentials."
    recommendation: "Filter sensitive fields before returning API responses."
    fixed_example: |
      user_data = {k: v for k, v in user.items() if k not in ['password', 'secret']}

  - id: MISCONF-LOG-001
    name: "Sensitive data logged"
