version: "1.0.0"
meta:
  product: VirlySentry
  description: Default vulnerability signature database for source code scanning
  updated: "2026-07-14"

settings:
  default_severity_threshold: LOW
  max_file_size_kb: 2048
  binary_extensions: [".png", ".jpg", ".jpeg", ".gif", ".ico", ".woff", ".woff2", ".ttf", ".zip", ".pdf", ".exe", ".dll", ".so"]
  excluded_dirs: [".git", "node_modules", "vendor", "venv", ".venv", "__pycache__", "dist", "build", ".idea", ".vscode", "coverage"]
  ignore_inline_marker: "virlysentry:ignore"

rules:
  # ---------------- SQL INJECTION ----------------
  - id: SQLI-PY-001
    name: "SQL Injection via string formatting (Python)"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-89"
    severity: CRITICAL
    languages: [python]
    extensions: [".py"]
    pattern: |-
      (?i)(execute|executemany)\s*\(\s*[f]?["'][^"']*["']\s*(\+|%|\.format\()
    scenario: "User-controlled input is concatenated or interpolated directly into a raw SQL query string, allowing an attacker to alter query logic (//sqli) and read, modify, or delete arbitrary database records, or bypass authentication."
    recommendation: "Use parameterized queries / prepared statements with placeholder bindings instead of string interpolation."
    fixed_example: |
      cursor.execute("SELECT * FROM users WHERE username = %s", (username,))

  - id: SQLI-PHP-001
    name: "SQL Injection via variable concatenation (PHP)"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-89"
    severity: CRITICAL
    languages: [php]
    extensions: [".php"]
    pattern: |-
      (?i)(mysqli_query|->query|pg_query)\s*\([^)]*\$(_GET|_POST|_REQUEST|_COOKIE)\b
    scenario: "A raw HTTP request parameter is passed directly into a SQL query function without sanitization or binding (//sqli), enabling attackers to manipulate the query and exfiltrate the database."
    recommendation: "Use PDO or mysqli prepared statements with bound parameters."
    fixed_example: |
      $stmt = $pdo->prepare("SELECT * FROM users WHERE id = :id");
      $stmt->execute(['id' => $id]);

  - id: SQLI-JS-001
    name: "SQL Injection via template literal (Node.js)"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-89"
    severity: CRITICAL
    languages: [javascript, typescript]
    extensions: [".js", ".ts"]
    pattern: |-
      (?i)\.(query|execute)\s*\(\s*`[^`]*\$\{
    scenario: "A template literal embeds a variable directly into a SQL query string sent to the database driver (//sqli), which allows injection of arbitrary SQL through crafted user input."
    recommendation: "Use parameterized queries provided by the driver (e.g. mysql2, pg) instead of template literals."
    fixed_example: |
      db.query("SELECT * FROM users WHERE id = ?", [id]);

  # ---------------- CROSS-SITE SCRIPTING (XSS) ----------------
  - id: XSS-JS-001
    name: "DOM-based XSS via innerHTML assignment"
    category: "Cross-Site Scripting"
    owasp: "A03:2021-Injection"
    cwe: "CWE-79"
    severity: HIGH
    languages: [javascript, typescript]
    extensions: [".js", ".ts", ".jsx", ".tsx"]
    pattern: |-
      \.innerHTML\s*=\s*[^;]*(location|document\.URL|req\.|params|query)
    scenario: "Attacker-controlled data (URL, query params, or request body) is written directly to innerHTML (//xss), allowing arbitrary script execution in the victim's browser session."
    recommendation: "Use textContent for plain text, or sanitize HTML using a trusted library such as DOMPurify before rendering."
    fixed_example: |
      element.textContent = userInput;
      // or
      element.innerHTML = DOMPurify.sanitize(userInput);

  - id: XSS-REACT-001
    name: "XSS via dangerouslySetInnerHTML"
    category: "Cross-Site Scripting"
    owasp: "A03:2021-Injection"
    cwe: "CWE-79"
    severity: HIGH
    languages: [javascript, typescript]
    extensions: [".jsx", ".tsx"]
    pattern: |-
      dangerouslySetInnerHTML\s*=\s*\{\{\s*__html:\s*(?!DOMPurify)
    scenario: "Unsanitized HTML is rendered directly into the DOM via React's dangerouslySetInnerHTML (//xss), bypassing React's default output escaping and enabling script injection."
    recommendation: "Sanitize the HTML with DOMPurify before assigning it to __html, or avoid raw HTML rendering entirely."
    fixed_example: |
      <div dangerouslySetInnerHTML={{ __html: DOMPurify.sanitize(content) }} />

  - id: XSS-PHP-001
    name: "Reflected XSS via unescaped echo of request data"
    category: "Cross-Site Scripting"
    owasp: "A03:2021-Injection"
    cwe: "CWE-79"
    severity: HIGH
    languages: [php]
    extensions: [".php"]
    pattern: |-
      (?i)echo\s+\$_(GET|POST|REQUEST)\b
    scenario: "Raw request input is echoed directly into the HTML response without output encoding (//xss), letting an attacker inject a malicious script via a crafted link."
    recommendation: "Escape all user-controlled output with htmlspecialchars() before rendering it into HTML."
    fixed_example: |
      echo htmlspecialchars($_GET['name'], ENT_QUOTES, 'UTF-8');

  - id: XSS-FLASK-001
    name: "Server-side XSS via render_template_string with user input"
    category: "Cross-Site Scripting / SSTI"
    owasp: "A03:2021-Injection"
    cwe: "CWE-79"
    severity: CRITICAL
    languages: [python]
    extensions: [".py"]
    pattern: |-
      (?i)render_template_string\s*\([^)]*(request\.(args|form|values|json))
    scenario: "User input is passed directly into render_template_string (//ssti), which can lead to both XSS and, more critically, Server-Side Template Injection allowing remote code execution."
    recommendation: "Never render user input as a template. Use render_template() with a static template file and pass user data only as context variables."
    fixed_example: |
      return render_template("greeting.html", name=request.args.get("name"))

  # ---------------- LOCAL/REMOTE FILE INCLUSION ----------------
  - id: LFI-PHP-001
    name: "Local File Inclusion via dynamic include/require"
    category: "Broken Access Control"
    owasp: "A01:2021-Broken Access Control"
    cwe: "CWE-98"
    severity: CRITICAL
    languages: [php]
    extensions: [".php"]
    pattern: |-
      (?i)(include|include_once|require|require_once)\s*\(?\s*\$_(GET|POST|REQUEST|COOKIE)
    scenario: "A file path derived from user-controlled input is passed to a PHP include/require statement (//lfi), which can be abused to include arbitrary local files or, combined with an upload, achieve remote code execution."
    recommendation: "Never build include paths from user input. Use a fixed allow-list of template identifiers mapped to safe file paths."
    fixed_example: |
      $allowed = ['home' => 'home.php', 'about' => 'about.php'];
      $page = $allowed[$_GET['page']] ?? 'home.php';
      include __DIR__ . '/pages/' . $page;

  - id: LFI-PY-001
    name: "Path Traversal / LFI via unsanitized open() path"
    category: "Broken Access Control"
    owasp: "A01:2021-Broken Access Control"
    cwe: "CWE-22"
    severity: HIGH
    languages: [python]
    extensions: [".py"]
    pattern: |-
      (?i)open\s*\(\s*[^)]*request\.(args|form|values)\.get
    scenario: "A filesystem path is constructed directly from an HTTP request parameter and passed to open() (//lfi), allowing an attacker to traverse directories (e.g. ../../etc/passwd) and read arbitrary files."
    recommendation: "Resolve the requested filename against a fixed base directory and verify with os.path.realpath that it stays inside that directory before opening it."
    fixed_example: |
      base_dir = os.path.realpath("uploads")
      target = os.path.realpath(os.path.join(base_dir, filename))
      if not target.startswith(base_dir + os.sep):
          abort(403)

  # ---------------- SERVER-SIDE REQUEST FORGERY ----------------
  - id: SSRF-PY-001
    name: "SSRF via unsanitized outbound request URL"
    category: "SSRF"
    owasp: "A10:2021-Server-Side Request Forgery"
    cwe: "CWE-918"
    severity: HIGH
    languages: [python]
    extensions: [".py"]
    pattern: |-
      (?i)requests\.(get|post|put|delete|head)\s*\(\s*[^)]*request\.(args|form|values|json)
    scenario: "A URL taken directly from user input is used as the target of a server-side outbound HTTP request (//ssrf), which an attacker can abuse to reach internal services, cloud metadata endpoints, or bypass network segmentation."
    recommendation: "Validate destination hosts against an allow-list and block requests to private/loopback/link-local IP ranges before making the outbound call."
    fixed_example: |
      if not is_allowed_host(parsed_url.hostname):
          raise ValueError("destination host not permitted")
      requests.get(validated_url, timeout=5)

  - id: SSRF-JS-001
    name: "SSRF via fetch/axios with user-supplied URL"
    category: "SSRF"
    owasp: "A10:2021-Server-Side Request Forgery"
    cwe: "CWE-918"
    severity: HIGH
    languages: [javascript, typescript]
    extensions: [".js", ".ts"]
    pattern: |-
      (?i)(axios|fetch)\s*\(\s*(req\.(query|body|params)|request\.(query|body))
    scenario: "The destination URL for a server-initiated HTTP request is taken directly from the incoming request (//ssrf), which can be used to pivot into internal infrastructure."
    recommendation: "Whitelist permitted destination domains/hosts and reject any URL resolving to private or reserved IP ranges before issuing the request."
    fixed_example: |
      if (!isAllowedHost(new URL(url).hostname)) throw new Error("blocked host");
      await axios.get(url);

  # ---------------- COMMAND INJECTION ----------------
  - id: CMDI-PY-001
    name: "OS Command Injection via os.system/subprocess shell=True"
    category: "Injection"
    owasp: "A03:2021-Injection"
    cwe: "CWE-78"
    severity: CRITICAL
    languages: [python]
    extensions: [".py"]
    pattern: |-
      (?i)(os\.system|os\.popen|subprocess\.(call|run|Popen)\([^)]*shell\s*=\s*True)
    scenario: "User-influenced data may reach a shell command executor (//rce), letting an attacker chain shell metacharacters to execute arbitrary operating system commands."
    recommendation: "Avoid shell=True. Pass the command as a list of arguments to subprocess.run() and never interpolate user input into a shell string."
    fixed_example: |
      subprocess.run(["ping", "-c", "1", host], shell=False, check=True)

  - id: CMDI-PHP-001
    name: "OS Command Injection via shell_exec/system"
    category: "Injection"
    owasp: "A03:2021-Injection"
    cwe: "CWE-78"
    severity: CRITICAL
    languages: [php]
    extensions: [".php"]
    pattern: |-
      (?i)(shell_exec|system|passthru|exec)\s*\([^)]*\$_(GET|POST|REQUEST)
    scenario: "A user-supplied HTTP parameter flows directly into a shell execution function (//rce), allowing arbitrary command execution on the host."
    recommendation: "Avoid shelling out to user input. If unavoidable, use escapeshellarg() on every argument and prefer an allow-list of permitted commands."
    fixed_example: |
      $safe = escapeshellarg($input);
      $output = shell_exec("some_binary " . $safe);

  - id: CMDI-JS-001
    name: "OS Command Injection via child_process.exec"
    category: "Injection"
    owasp: "A03:2021-Injection"
    cwe: "CWE-78"
    severity: CRITICAL
    languages: [javascript, typescript]
    extensions: [".js", ".ts"]
    pattern: |-
      (?i)child_process\.exec\s*\(\s*[`"'][^`"']*\$\{
    scenario: "A shell command string is built by interpolating a variable directly into child_process.exec (//rce), which spawns a shell and is vulnerable to command chaining via metacharacters."
    recommendation: "Use execFile() or spawn() with an argument array instead of exec() with a concatenated string."
    fixed_example: |
      execFile("convert", [inputPath, outputPath]);

  # ---------------- INSECURE DESERIALIZATION ----------------
  - id: DESER-PY-001
    name: "Insecure Deserialization via pickle.loads on untrusted data"
    category: "Insecure Deserialization"
    owasp: "A08:2021-Software and Data Integrity Failures"
    cwe: "CWE-502"
    severity: CRITICAL
    languages: [python]
    extensions: [".py"]
    pattern: |-
      (?i)pickle\.(loads|load)\s*\(
    scenario: "pickle.loads deserializes untrusted byte streams (//deser), and a crafted payload can execute arbitrary code during unpickling."
    recommendation: "Never unpickle data from an untrusted source. Use a safe format such as JSON, or cryptographically sign/verify the payload before unpickling."
    fixed_example: |
      data = json.loads(payload)

  - id: DESER-PY-002
    name: "Unsafe YAML load allowing arbitrary object construction"
    category: "Insecure Deserialization"
    owasp: "A08:2021-Software and Data Integrity Failures"
    cwe: "CWE-502"
    severity: HIGH
    languages: [python]
    extensions: [".py"]
    pattern: |-
      (?i)yaml\.load\s*\((?!.*Loader\s*=\s*yaml\.SafeLoader)
    scenario: "yaml.load() without an explicit SafeLoader can instantiate arbitrary Python objects from the YAML document (//deser), leading to remote code execution when the file is attacker-influenced."
    recommendation: "Always use yaml.safe_load() or explicitly pass Loader=yaml.SafeLoader."
    fixed_example: |
      data = yaml.safe_load(stream)

  - id: DESER-PHP-001
    name: "PHP Object Injection via unserialize on user input"
    category: "Insecure Deserialization"
    owasp: "A08:2021-Software and Data Integrity Failures"
    cwe: "CWE-502"
    severity: CRITICAL
    languages: [php]
    extensions: [".php"]
    pattern: |-
      (?i)unserialize\s*\(\s*\$_(GET|POST|REQUEST|COOKIE)
    scenario: "User-controlled data is passed to unserialize() (//deser), which can trigger PHP Object Injection and, via a suitable gadget chain, arbitrary code execution."
    recommendation: "Use json_decode()/json_encode() for data interchange instead of PHP native serialization when the source is untrusted."
    fixed_example: |
      $data = json_decode($_POST['payload'], true);

  # ---------------- WEAK CRYPTOGRAPHY / SECRETS ----------------
  - id: CRYPTO-001
    name: "Use of weak hash algorithm for password storage"
    category: "Cryptographic Failures"
    owasp: "A02:2021-Cryptographic Failures"
    cwe: "CWE-327"
    severity: HIGH
    languages: [python, php, javascript, typescript]
    extensions: [".py", ".php", ".js", ".ts"]
    pattern: |-
      (?i)(md5|sha1)\s*\([^)]*(password|passwd|pwd|secret)
    scenario: "MD5/SHA-1 are fast, unsalted, and considered cryptographically broken for password hashing (//weak-crypto), making offline brute-force and rainbow-table attacks practical."
    recommendation: "Use a purpose-built password hashing algorithm such as bcrypt, scrypt, or Argon2 with a per-user salt."
    fixed_example: |
      hashed = bcrypt.hashpw(password.encode(), bcrypt.gensalt())

  - id: SECRET-001
    name: "Hardcoded credential or API key"
    category: "Cryptographic Failures"
    owasp: "A02:2021-Cryptographic Failures"
    cwe: "CWE-798"
    severity: CRITICAL
    languages: [python, php, javascript, typescript, generic]
    extensions: [".py", ".php", ".js", ".ts", ".env", ".yaml", ".yml", ".json"]
    pattern: |-
      (?i)(api[_-]?key|secret[_-]?key|access[_-]?token|aws_secret_access_key|private_key)\s*[:=]\s*["''][A-Za-z0-9/\+_\-]{16,}["'']
    scenario: "A credential or API key is hardcoded directly in source (//hardcoded-secret), exposing it to anyone with repository access and to CI/CD logs, forks, or leaked artifacts."
    recommendation: "Move secrets to environment variables or a secrets manager (e.g. Vault, AWS Secrets Manager) and load them at runtime; rotate any credential that was ever committed."
    fixed_example: |
      api_key = os.environ["API_KEY"]

  - id: CRYPTO-PY-002
    name: "Use of insecure pseudo-random generator for security tokens"
    category: "Cryptographic Failures"
    owasp: "A02:2021-Cryptographic Failures"
    cwe: "CWE-338"
    severity: MEDIUM
    languages: [python]
    extensions: [".py"]
    pattern: |-
      (?i)random\.(random|randint|choice)\s*\([^)]*\).*(token|session|password|otp)
    scenario: "The standard random module is not cryptographically secure (//weak-random); tokens or session identifiers generated with it can be predicted by an attacker."
    recommendation: "Use the secrets module for any security-sensitive random value."
    fixed_example: |
      token = secrets.token_urlsafe(32)

  # ---------------- XXE ----------------
  - id: XXE-PY-001
    name: "XML External Entity (XXE) via unsafe XML parser"
    category: "XXE"
    owasp: "A05:2021-Security Misconfiguration"
    cwe: "CWE-611"
    severity: HIGH
    languages: [python]
    extensions: [".py"]
    pattern: |-
      (?i)xml\.etree\.ElementTree\.(parse|fromstring)\s*\(
    scenario: "The standard library XML parser resolves external entities by default (//xxe), which can be abused to read local files or perform SSRF through a malicious XML payload."
    recommendation: "Parse untrusted XML using the defusedxml library instead of xml.etree.ElementTree."
    fixed_example: |
      from defusedxml.ElementTree import parse
      tree = parse(xml_source)

  - id: XXE-PHP-001
    name: "XXE via libxml external entity loading"
    category: "XXE"
    owasp: "A05:2021-Security Misconfiguration"
    cwe: "CWE-611"
    severity: HIGH
    languages: [php]
    extensions: [".php"]
    pattern: |-
      (?i)simplexml_load_string\s*\([^)]*\)(?!.*LIBXML_NOENT)
    scenario: "Loading XML without disabling external entity resolution (//xxe) allows an attacker-supplied DOCTYPE to read local files or trigger SSRF requests."
    recommendation: "Disable external entity loading explicitly (libxml_disable_entity_loader(true) on PHP < 8, and avoid LIBXML_NOENT with untrusted DTDs)."
    fixed_example: |
      libxml_disable_entity_loader(true);
      $xml = simplexml_load_string($data);

  # ---------------- SECURITY MISCONFIGURATION ----------------
  - id: MISCONF-FLASK-001
    name: "Flask application running with debug mode enabled"
    category: "Security Misconfiguration"
    owasp: "A05:2021-Security Misconfiguration"
    cwe: "CWE-489"
    severity: HIGH
    languages: [python]
    extensions: [".py"]
    pattern: |-
      (?i)app\.run\s*\([^)]*debug\s*=\s*True
    scenario: "Flask's debug mode exposes the Werkzeug interactive debugger (//debug-exposed), which allows arbitrary Python code execution if reached by an attacker in production."
    recommendation: "Disable debug mode in production and control it through an environment-based configuration flag."
    fixed_example: |
      app.run(debug=os.environ.get("FLASK_DEBUG", "false") == "true")

  - id: MISCONF-DJANGO-001
    name: "Django DEBUG setting enabled"
    category: "Security Misconfiguration"
    owasp: "A05:2021-Security Misconfiguration"
    cwe: "CWE-489"
    severity: HIGH
    languages: [python]
    extensions: [".py"]
    pattern: |-
      (?im)^\s*DEBUG\s*=\s*True\s*$
    scenario: "DEBUG=True in a Django settings file leaks stack traces, environment variables, and internal paths to any visitor when an unhandled exception occurs (//debug-exposed)."
    recommendation: "Set DEBUG based on an environment variable and default to False."
    fixed_example: |
      DEBUG = os.environ.get("DJANGO_DEBUG", "False") == "True"

  - id: MISCONF-CORS-001
    name: "Overly permissive CORS policy (wildcard origin)"
    category: "Security Misconfiguration"
    owasp: "A05:2021-Security Misconfiguration"
    cwe: "CWE-942"
    severity: MEDIUM
    languages: [python, javascript, typescript, php]
    extensions: [".py", ".js", ".ts", ".php"]
    pattern: |-
      (?i)(Access-Control-Allow-Origin|cors\(\s*\{\s*origin)\s*[:=,]?\s*["'\*]\*
    scenario: "A wildcard CORS origin allows any website to make authenticated cross-origin requests to this API (//cors-wildcard), which can lead to sensitive data exfiltration when combined with credentialed requests."
    recommendation: "Restrict Access-Control-Allow-Origin to an explicit allow-list of trusted origins."
    fixed_example: |
      response.headers["Access-Control-Allow-Origin"] = "https://trusted.example.com"

  - id: MISCONF-COOKIE-001
    name: "Session cookie missing Secure/HttpOnly flags"
    category: "Security Misconfiguration"
    owasp: "A05:2021-Security Misconfiguration"
    cwe: "CWE-614"
    severity: MEDIUM
    languages: [javascript, typescript, python, php]
    extensions: [".js", ".ts", ".py", ".php"]
    pattern: |-
      (?i)(set-cookie|setCookie|session\.cookie)[^\n]*(?!.*(Secure|HttpOnly))
    scenario: "A session cookie is set without the Secure and HttpOnly flags (//insecure-cookie), leaving it exposed to interception over plaintext HTTP and to theft via client-side script injection (XSS)."
    recommendation: "Set both HttpOnly and Secure (and SameSite) attributes on any cookie carrying session or authentication data."
    fixed_example: |
      res.cookie("session_id", token, { httpOnly: true, secure: true, sameSite: "strict" });

  # ---------------- SSTI (generic Jinja2) ----------------
  - id: SSTI-PY-002
    name: "Server-Side Template Injection via string-built template"
    category: "Injection"
    owasp: "A03:2021-Injection"
    cwe: "CWE-1336"
    severity: CRITICAL
    languages: [python]
    extensions: [".py"]
    pattern: |-
      (?i)Template\s*\(\s*[f]?["'].*\{.*request\.
    scenario: "A Jinja2 Template object is constructed from a string that embeds request data (//ssti), allowing an attacker to inject template syntax and achieve remote code execution."
    recommendation: "Never build template source strings from user input; load templates from static files and pass user data only as render context."
    fixed_example: |
      template = env.get_template("page.html")
      template.render(name=request.args.get("name"))

  # ---------------- BROKEN ACCESS CONTROL ----------------
  - id: ACCESS-001
    name: "Missing authentication/authorization check before sensitive action"
    category: "Broken Access Control"
    owasp: "A01:2021-Broken Access Control"
    cwe: "CWE-862"
    severity: INFO
    languages: [python, javascript, typescript, php]
    extensions: [".py", ".js", ".ts", ".php"]
    pattern: |-
      (?i)(def|function)\s+(delete|remove|admin|update)_?\w*\s*\(
    scenario: "A function performing a destructive or administrative action was found; confirm it enforces an authentication/authorization check before executing (//access-control), otherwise it may allow privilege escalation or unauthorized data modification."
    recommendation: "Add an explicit authorization check (role/permission verification) at the top of the handler before performing the sensitive operation."
    fixed_example: |
      if not current_user.has_permission("delete_resource"):
          abort(403)

  # ---------------- VULNERABLE COMPONENTS / EVAL ----------------
  - id: EVAL-JS-001
    name: "Use of eval() / Function constructor on dynamic input"
    category: "Injection"
    owasp: "A03:2021-Injection"
    cwe: "CWE-95"
    severity: CRITICAL
    languages: [javascript, typescript]
    extensions: [".js", ".ts"]
    pattern: |-
      (?i)(^|[^a-zA-Z_])eval\s*\(|new\s+Function\s*\(
    scenario: "eval() or the Function constructor executes a string as code at runtime (//code-injection); if any part of that string is influenced by user input, arbitrary JavaScript execution becomes possible."
    recommendation: "Avoid eval()/Function() entirely. Use JSON.parse() for data and explicit function references instead of dynamically constructed code."
    fixed_example: |
      const data = JSON.parse(jsonString);

  - id: EVAL-PY-001
    name: "Use of eval()/exec() on dynamic input"
    category: "Injection"
    owasp: "A03:2021-Injection"
    cwe: "CWE-95"
    severity: CRITICAL
    languages: [python]
    extensions: [".py"]
    pattern: |-
      (?i)(^|[^a-zA-Z_])(eval|exec)\s*\(
    scenario: "eval()/exec() compiles and runs a string as Python code (//code-injection); any attacker influence over that string leads directly to arbitrary code execution."
    recommendation: "Replace eval()/exec() with a safe, explicit alternative such as ast.literal_eval() for data parsing, or a dispatch dictionary for command routing."
    fixed_example: |
      import ast
      value = ast.literal_eval(user_input)

  - id: VULN-DEP-001
    name: "Known-vulnerable dependency version pinned"
    category: "Vulnerable and Outdated Components"
    owasp: "A06:2021-Vulnerable and Outdated Components"
    cwe: "CWE-1104"
    severity: HIGH
    languages: [generic]
    extensions: [".txt", ".json", ".lock", ".toml"]
    pattern: |-
      (?i)"?(lodash)"?\s*[:=]\s*"?[\^~]?4\.17\.(0|1[0-9]|20)\b|"?(log4j-core)"?\s*[:=]\s*"?2\.(0|1[0-6])\.
    scenario: "The manifest pins a package version with a publicly disclosed CVE (//vulnerable-dependency) (e.g. lodash prototype pollution, Log4Shell), leaving the application exposed to known, weaponized exploits."
    recommendation: "Upgrade the dependency to a patched version and enable automated dependency scanning (e.g. Dependabot/Snyk) in CI/CD."
    fixed_example: |
      "lodash": "^4.17.21"
