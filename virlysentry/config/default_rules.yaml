version: "2.0.0"
meta:
  product: VirlySentry
  description: Default vulnerability signature database for source code scanning
  updated: "2026-07-14"
  changelog: "v2.0.0: expanded coverage to Java, Go, Ruby, C#/.NET, C; added NoSQL/LDAP/XPath injection, deserialization, TLS misconfig, JWT, SSRF/redirect, ReDoS, Zip Slip, mass assignment, CSRF, clickjacking, and other OWASP Top 10 / CWE Top 25 categories. Severity levels reviewed against exploit prerequisites and impact per internal risk-rating standard (see severity_rubric)."

settings:
  default_severity_threshold: LOW
  max_file_size_kb: 2048
  binary_extensions: [".png", ".jpg", ".jpeg", ".gif", ".ico", ".woff", ".woff2", ".ttf", ".zip", ".pdf", ".exe", ".dll", ".so"]
  excluded_dirs: [".git", "node_modules", "vendor", "venv", ".venv", "__pycache__", "dist", "build", ".idea", ".vscode", "coverage", "target", "bin", "obj"]
  ignore_inline_marker: "virlysentry:ignore"

severity_rubric:
  CRITICAL: Unauthenticated or trivially-triggered RCE, full auth bypass, or direct arbitrary data exfiltration/modification with no special preconditions.
  HIGH: Significant confidentiality/integrity/availability impact, but requires some precondition (e.g. attacker must reach an internal-only route, or issue is conditional on config).
  MEDIUM: Real security weakness with limited blast radius, requires chaining with another bug, or mainly affects defense-in-depth.
  LOW: Hardening / best-practice gap; exploitability is low or requires unusual circumstances.
  INFO: Not a vulnerability by itself — a pattern that needs human review because it *could* be a vulnerability in context.

rules:
# SQL INJECTION
  - id: SQLI-PY-001
    name: "SQL Injection via string formatting (Python)"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-89"
    severity: CRITICAL
    languages: [python]
    extensions: [".py"]
    pattern: |-
      (?i)(execute|executemany)\s*\(\s*[f]?["'][^"']*["']\s*(\+|%|\.format\()
    scenario: "User-controlled input is concatenated or interpolated directly into a raw SQL query string, allowing an attacker to alter query logic (//sqli) and read, modify, or delete arbitrary database records, or bypass authentication."
    recommendation: "Use parameterized queries / prepared statements with placeholder bindings instead of string interpolation."
    fixed_example: |
      cursor.execute("SELECT * FROM users WHERE username = %s", (username,))

  - id: SQLI-PHP-001
    name: "SQL Injection via variable concatenation (PHP)"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-89"
    severity: CRITICAL
    languages: [php]
    extensions: [".php"]
    pattern: |-
      (?i)(mysqli_query|->query|pg_query)\s*\([^)]*\$(_GET|_POST|_REQUEST|_COOKIE)\b
    scenario: "A raw HTTP request parameter is passed directly into a SQL query function without sanitization or binding (//sqli), enabling attackers to manipulate the query and exfiltrate the database."
    recommendation: "Use PDO or mysqli prepared statements with bound parameters."
    fixed_example: |
      $stmt = $pdo->prepare("SELECT * FROM users WHERE id = :id");
      $stmt->execute(['id' => $id]);

  - id: SQLI-JS-001
    name: "SQL Injection via template literal (Node.js)"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-89"
    severity: CRITICAL
    languages: [javascript, typescript]
    extensions: [".js", ".ts"]
    pattern: |-
      (?i)\.(query|execute)\s*\(\s*`[^`]*\$\{
    scenario: "A template literal embeds a variable directly into a SQL query string sent to the database driver (//sqli), which allows injection of arbitrary SQL through crafted user input."
    recommendation: "Use parameterized queries provided by the driver (e.g. mysql2, pg) instead of template literals."
    fixed_example: |
      db.query("SELECT * FROM users WHERE id = ?", [id]);

  - id: SQLI-JAVA-001
    name: "SQL Injection via Statement with concatenated input (Java)"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-89"
    severity: CRITICAL
    languages: [java]
    extensions: [".java"]
    pattern: |-
      (?i)createStatement\s*\(\s*\)[\s\S]{0,80}?\.execute(Query|Update)?\s*\(\s*["'][^"']*["']\s*\+
    scenario: "A java.sql.Statement executes a query string built by concatenating a variable (//sqli), instead of using a PreparedStatement, letting an attacker inject arbitrary SQL through any tainted input reaching the concatenation."
    recommendation: "Use PreparedStatement with '?' placeholders and setX() bindings instead of Statement with string concatenation."
    fixed_example: |
      PreparedStatement ps = conn.prepareStatement("SELECT * FROM users WHERE id = ?");
      ps.setInt(1, id);

  - id: SQLI-RUBY-001
    name: "SQL Injection via unsanitized ActiveRecord where clause (Ruby on Rails)"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-89"
    severity: CRITICAL
    languages: [ruby]
    extensions: [".rb"]
    pattern: |-
      (?i)\.where\s*\(\s*["'][^"']*#\{
    scenario: "String interpolation is used inside an ActiveRecord .where() clause (//sqli), bypassing Rails' automatic parameter binding and allowing SQL injection through the interpolated value."
    recommendation: "Pass values as bind parameters, e.g. Model.where(\"name = ?\", name), instead of interpolating them into the SQL string."
    fixed_example: |
      User.where("email = ?", params[:email])

  - id: SQLI-GO-001
    name: "SQL Injection via fmt.Sprintf query building (Go)"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-89"
    severity: CRITICAL
    languages: [go]
    extensions: [".go"]
    pattern: |-
      (?i)(db|conn|tx)\.(Query|QueryRow|Exec)\s*\(\s*fmt\.Sprintf\s*\(
    scenario: "A SQL statement is assembled at runtime with fmt.Sprintf and passed to database/sql's Query/Exec (//sqli), which means any tainted value formatted into the string can alter query semantics."
    recommendation: "Use parameterized placeholders ($1, ?) supported natively by database/sql instead of building the query text with fmt.Sprintf."
    fixed_example: |
      db.Query("SELECT * FROM users WHERE id = $1", id)

  - id: SQLI-CSHARP-001
    name: "SQL Injection via concatenated SqlCommand text (C#/.NET)"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-89"
    severity: CRITICAL
    languages: [csharp]
    extensions: [".cs"]
    pattern: |-
      (?i)new\s+SqlCommand\s*\(\s*["'][^"']*["']\s*\+
    scenario: "A SqlCommand is constructed with a query string built via '+' concatenation (//sqli), which allows an attacker-controlled value inserted into the string to change the query's meaning."
    recommendation: "Use parameterized SqlCommand with SqlParameter objects instead of concatenating values into the SQL text."
    fixed_example: |
      var cmd = new SqlCommand("SELECT * FROM Users WHERE Id = @id", conn);
      cmd.Parameters.AddWithValue("@id", id);

  - id: SQLI-PY-002
    name: "SQL Injection via raw string in Django raw() query"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-89"
    severity: CRITICAL
    languages: [python]
    extensions: [".py"]
    pattern: |-
      (?i)\.raw\s*\(\s*["'][^"']*%s
    scenario: "Django's raw() query is used with %s string formatting (//sqli), which bypasses parameterization and enables SQL injection."
    recommendation: "Use Django's parameterized raw queries with list of parameters."
    fixed_example: |
      Model.objects.raw("SELECT * FROM table WHERE id = %s", [user_id])

  - id: SQLI-PHP-002
    name: "SQL Injection via dynamic table/column names in PHP"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-89"
    severity: CRITICAL
    languages: [php]
    extensions: [".php"]
    pattern: |-
      (?i)SELECT\s+.*\s+FROM\s+\$(_GET|_POST|_REQUEST)
    scenario: "Dynamic table or column names from user input are directly embedded (//sqli), allowing attackers to manipulate query structure."
    recommendation: "Whitelist table and column names; never use user input directly for identifiers."
    fixed_example: |
      $allowed_tables = ['users', 'products'];
      if (!in_array($table, $allowed_tables)) throw new Exception();

  - id: SQLI-RUBY-002
    name: "SQL Injection via raw connection execute (Ruby)"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-89"
    severity: CRITICAL
    languages: [ruby]
    extensions: [".rb"]
    pattern: |-
      (?i)ActiveRecord\.Base\.connection\.execute\s*\(\s*["'][^"']*#\{
    scenario: "Raw SQL execution with string interpolation (//sqli) bypasses ActiveRecord's protection."
    recommendation: "Use ActiveRecord's parameterized query methods or sanitize_sql_array."
    fixed_example: |
      ActiveRecord::Base.connection.execute(
        ActiveRecord::Base.sanitize_sql_array(["SELECT * FROM users WHERE id = ?", id])
      )

  - id: SQLI-GO-002
    name: "SQL Injection via raw string concatenation in GORM (Go)"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-89"
    severity: CRITICAL
    languages: [go]
    extensions: [".go"]
    pattern: |-
      (?i)db\.(Raw|Exec)\s*\(\s*["'][^"']*\+
    scenario: "String concatenation in GORM Raw/Exec queries (//sqli) allows SQL injection."
    recommendation: "Use GORM's parameter placeholders with Raw and Exec."
    fixed_example: |
      db.Raw("SELECT * FROM users WHERE id = ?", id).Scan(&user)

  - id: SQLI-JAVA-002
    name: "SQL Injection via JPA native query with concatenation (Java)"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-89"
    severity: CRITICAL
    languages: [java]
    extensions: [".java"]
    pattern: |-
      (?i)@Query\s*\(\s*value\s*=\s*["'][^"']*["']\s*\+\s*
    scenario: "String concatenation in JPA native queries (//sqli) bypasses parameterization."
    recommendation: "Use named parameters with @Param or positional parameters in JPA queries."
    fixed_example: |
      @Query(value = "SELECT * FROM users WHERE id = :id", nativeQuery = true)
      User findById(@Param("id") Long id);

  - id: SQLI-CSHARP-002
    name: "SQL Injection via Entity Framework RawSql (C#)"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-89"
    severity: CRITICAL
    languages: [csharp]
    extensions: [".cs"]
    pattern: |-
      (?i)FromSqlRaw\s*\(\s*[$]?["'][^"']*\+\s*
    scenario: "Concatenated string in FromSqlRaw (//sqli) enables SQL injection."
    recommendation: "Use FromSqlInterpolated or parameterized FromSqlRaw with placeholders."
    fixed_example: |
      context.Users.FromSqlInterpolated($"SELECT * FROM Users WHERE Id = {id}")

  - id: SQLI-PY-003
    name: "SQL Injection via SQLAlchemy raw text with concatenation"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-89"
    severity: CRITICAL
    languages: [python]
    extensions: [".py"]
    pattern: |-
      (?i)text\s*\(\s*["'][^"']*"'\s*\+\s*
    scenario: "String concatenation in SQLAlchemy text() (//sqli) allows SQL injection."
    recommendation: "Use SQLAlchemy's parameter binding with :param placeholders."
    fixed_example: |
      stmt = text("SELECT * FROM users WHERE id = :id")
      result = conn.execute(stmt, {"id": user_id})

  - id: SQLI-NOSQL-001
    name: "SQL Injection via NoSQL query operator injection"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-943"
    severity: HIGH
    languages: [javascript, typescript]
    extensions: [".js", ".ts"]
    pattern: |-
      \$(gt|gte|lt|lte|ne|in|nin|and|or|not|exists|type|regex)
    scenario: "NoSQL operator injection (//nosql-op) allows attackers to manipulate query logic."
    recommendation: "Validate and sanitize user input against operator injection."
    fixed_example: |
      const safeQuery = sanitizeQuery(req.body);

# NOSQL/LDAP/XPATH INJECTION
  - id: NOSQLI-JS-001
    name: "NoSQL Injection via unvalidated object passed to MongoDB query (Node.js)"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-943"
    severity: HIGH
    languages: [javascript, typescript]
    extensions: [".js", ".ts"]
    pattern: |-
      (?i)\.(find|findOne|update|updateOne|deleteOne)\s*\(\s*(req\.(body|query|params)|request\.(body|query))\s*\)
    scenario: "A raw request body/query object is passed directly as a MongoDB filter (//nosqli), letting an attacker inject operators such as $ne or $gt to bypass authentication or logic checks."
    recommendation: "Whitelist and cast expected fields explicitly, and strip/reject keys starting with '$' before building the query object (e.g. with a library like mongo-sanitize)."
    fixed_example: |
      const filter = { username: String(req.body.username) };
      db.collection('users').findOne(filter);

  - id: NOSQLI-PY-001
    name: "NoSQL Injection via unvalidated dict passed to PyMongo query"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-943"
    severity: HIGH
    languages: [python]
    extensions: [".py"]
    pattern: |-
      (?i)\.(find|find_one|update_one|delete_one)\s*\(\s*(request\.(json|args|form))\s*\)
    scenario: "A Flask/Django request object is passed unmodified as a MongoDB filter (//nosqli), allowing operator injection (e.g. {\"$gt\": \"\"}) that bypasses intended query conditions."
    recommendation: "Explicitly extract and type-cast each expected field before constructing the MongoDB filter; reject any key beginning with '$'."
    fixed_example: |
      filter = {"username": str(request.json.get("username"))}
      collection.find_one(filter)

  - id: NOSQLI-JAVA-001
    name: "NoSQL Injection via unvalidated query in MongoDB Java Driver"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-943"
    severity: HIGH
    languages: [java]
    extensions: [".java"]
    pattern: |-
      (?i)Filters\.(eq|gt|gte|lt|lte|ne|in|nin)\s*\(\s*["'][^"']*["']\s*,\s*getParameter\s*\(
    scenario: "MongoDB filter operators built from user input (//nosqli) can be manipulated."
    recommendation: "Validate user input before using in MongoDB filters."
    fixed_example: |
      Bson filter = Filters.eq("username", sanitize(username));

  - id: NOSQLI-PHP-001
    name: "NoSQL Injection via unvalidated array in MongoDB PHP driver"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-943"
    severity: HIGH
    languages: [php]
    extensions: [".php"]
    pattern: |-
      (?i)new\s+MongoDB\\Collection\s*\([^)]*\)\s*->\s*(find|findOne|updateOne)\s*\(\s*\$_(GET|POST|REQUEST)
    scenario: "Raw request data passed to MongoDB queries (//nosqli) enables operator injection."
    recommendation: "Sanitize input to prevent NoSQL operator injection."
    fixed_example: |
      $filter = ['username' => (string)$_GET['username']];
      $collection->findOne($filter);

  - id: NOSQLI-GO-001
    name: "NoSQL Injection via unvalidated bson.M in MongoDB Go driver"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-943"
    severity: HIGH
    languages: [go]
    extensions: [".go"]
    pattern: |-
      (?i)bson\.M\s*\{\s*["'][^"']*["']\s*:\s*[^}]+\}\s*\)?
    scenario: "Unvalidated bson.M from user input (//nosqli) allows operator injection."
    recommendation: "Validate and sanitize keys and values in bson.M."
    fixed_example: |
      filter := bson.M{"username": sanitize(username)}

  - id: NOSQLI-RUBY-001
    name: "NoSQL Injection via unvalidated hash in Mongoid (Ruby)"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-943"
    severity: HIGH
    languages: [ruby]
    extensions: [".rb"]
    pattern: |-
      (?i)(Model|model)\.(where|find_by|create|update)\s*\(\s*params\s*\)
    scenario: "Unfiltered params hash in Mongoid queries (//nosqli) enables operator injection."
    recommendation: "Use strong parameters to whitelist allowed fields."
    fixed_example: |
      User.where(name: params[:name])

  - id: NOSQLI-CSHARP-001
    name: "NoSQL Injection via unvalidated BsonDocument in MongoDB .NET driver"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-943"
    severity: HIGH
    languages: [csharp]
    extensions: [".cs"]
    pattern: |-
      (?i)new\s+BsonDocument\s*\(\s*["'][^"']*["']\s*,\s*["'][^"']*["']\s*\)
    scenario: "BsonDocument built from user input (//nosqli) allows operator injection."
    recommendation: "Use a sanitization library or validate input before building BsonDocument."
    fixed_example: |
      var filter = Builders<User>.Filter.Eq("username", sanitize(username));

  - id: LDAPI-JAVA-001
    name: "LDAP Injection via unescaped filter concatenation (Java)"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-90"
    severity: HIGH
    languages: [java]
    extensions: [".java"]
    pattern: |-
      (?i)search\s*\(\s*[^,]+,\s*["'][^"']*["']\s*\+
    scenario: "An LDAP search filter is built by concatenating user input into the filter string (//ldapi), allowing an attacker to inject filter metacharacters and alter the query to bypass authentication or dump directory entries."
    recommendation: "Escape all user-supplied values with a proper LDAP filter encoder before inserting them into the filter, or use a parameterized LDAP query API."
    fixed_example: |
      String safeFilter = "(uid=" + Rdn.escapeValue(username) + ")";

  - id: LDAPI-PHP-001
    name: "LDAP Injection via unescaped filter concatenation (PHP)"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-90"
    severity: HIGH
    languages: [php]
    extensions: [".php"]
    pattern: |-
      (?i)ldap_search\s*\([^)]*\$_(GET|POST|REQUEST)
    scenario: "A raw HTTP parameter flows directly into ldap_search() as part of the filter (//ldapi), which can let an attacker manipulate the LDAP query logic."
    recommendation: "Escape user input with ldap_escape() before building the filter string."
    fixed_example: |
      $safe = ldap_escape($_GET['user'], "", LDAP_ESCAPE_FILTER);
      ldap_search($conn, $base, "(uid=$safe)");

  - id: LDAPI-PY-001
    name: "LDAP Injection via unescaped filter concatenation (Python)"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-90"
    severity: HIGH
    languages: [python]
    extensions: [".py"]
    pattern: |-
      (?i)ldap\.search\s*\([^)]*["'][^"']*["']\s*%
    scenario: "LDAP filter string built with % formatting (//ldapi) allows injection."
    recommendation: "Use ldap.filter.filter_format or escape values."
    fixed_example: |
      filter = f"(uid={ldap.filter.escape_value(username)})"

  - id: LDAPI-GO-001
    name: "LDAP Injection via unescaped filter concatenation (Go)"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-90"
    severity: HIGH
    languages: [go]
    extensions: [".go"]
    pattern: |-
      (?i)(ldap\.(Search|Add|Modify|Delete)).*\+\s*
    scenario: "String concatenation in LDAP operations (//ldapi) allows injection."
    recommendation: "Use ldap.EscapeFilter or parameterized LDAP queries."
    fixed_example: |
      filter := fmt.Sprintf("(uid=%s)", ldap.EscapeFilter(username))

  - id: XPATHI-001
    name: "XPath Injection via concatenated expression"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-643"
    severity: HIGH
    languages: [java, python, php]
    extensions: [".java", ".py", ".php"]
    pattern: |-
      (?i)(evaluate|xpath_eval|XPath::query)\s*\(\s*["'][^"']*["']\s*\+
    scenario: "An XPath expression is assembled via string concatenation with user input (//xpathi), which can be abused to bypass authentication checks or extract arbitrary nodes from the XML document."
    recommendation: "Use parameterized XPath (XPathExpression with variable bindings) instead of building expressions via string concatenation."
    fixed_example: |
      // Use XPath variable resolvers instead of concatenating raw values into the expression

  - id: XPATHI-PY-001
    name: "XPath Injection via lxml with user input"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-643"
    severity: HIGH
    languages: [python]
    extensions: [".py"]
    pattern: |-
      (?i)\.xpath\s*\(\s*["'][^"']*["']\s*%
    scenario: "XPath expression with string formatting (//xpathi) enables injection."
    recommendation: "Use XPath variables or escape user input."
    fixed_example: |
      tree.xpath("//user[@id=$id]", id=xml_id)

  - id: XPATHI-PHP-001
    name: "XPath Injection via DOMXPath query (PHP)"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-643"
    severity: HIGH
    languages: [php]
    extensions: [".php"]
    pattern: |-
      (?i)new\s+DOMXPath\s*\([^)]*\)\s*->\s*query\s*\(\s*["'][^"']*["']\s*\.\s*\$_(GET|POST|REQUEST)
    scenario: "DOMXPath query concatenation (//xpathi) enables XPath injection."
    recommendation: "Use XPath variables or quote/escape values."
    fixed_example: |
      $query = "//user[@id='" . addslashes($id) . "']";

# CROSS-SITE SCRIPTING (XSS)
  - id: XSS-JS-001
    name: "DOM-based XSS via innerHTML assignment"
    category: "Cross-Site Scripting"
    owasp: "A03:2021-Injection"
    cwe: "CWE-79"
    severity: HIGH
    languages: [javascript, typescript]
    extensions: [".js", ".ts", ".jsx", ".tsx"]
    pattern: |-
      \.innerHTML\s*=\s*[^;]*(location|document\.URL|req\.|params|query)
    scenario: "Attacker-controlled data (URL, query params, or request body) is written directly to innerHTML (//xss), allowing arbitrary script execution in the victim's browser session."
    recommendation: "Use textContent for plain text, or sanitize HTML using a trusted library such as DOMPurify before rendering."
    fixed_example: |
      element.textContent = userInput;
      // or
      element.innerHTML = DOMPurify.sanitize(userInput);

  - id: XSS-REACT-001
    name: "XSS via dangerouslySetInnerHTML"
    category: "Cross-Site Scripting"
    owasp: "A03:2021-Injection"
    cwe: "CWE-79"
    severity: HIGH
    languages: [javascript, typescript]
    extensions: [".jsx", ".tsx"]
    pattern: |-
      dangerouslySetInnerHTML\s*=\s*\{\{\s*__html:\s*(?!DOMPurify)
    scenario: "Unsanitized HTML is rendered directly into the DOM via React's dangerouslySetInnerHTML (//xss), bypassing React's default output escaping and enabling script injection."
    recommendation: "Sanitize the HTML with DOMPurify before assigning it to __html, or avoid raw HTML rendering entirely."
    fixed_example: |
      <div dangerouslySetInnerHTML={{ __html: DOMPurify.sanitize(content) }} />

  - id: XSS-PHP-001
    name: "Reflected XSS via unescaped echo of request data"
    category: "Cross-Site Scripting"
    owasp: "A03:2021-Injection"
    cwe: "CWE-79"
    severity: HIGH
    languages: [php]
    extensions: [".php"]
    pattern: |-
      (?i)echo\s+\$_(GET|POST|REQUEST)\b
    scenario: "Raw request input is echoed directly into the HTML response without output encoding (//xss), letting an attacker inject a malicious script via a crafted link."
    recommendation: "Escape all user-controlled output with htmlspecialchars() before rendering it into HTML."
    fixed_example: |
      echo htmlspecialchars($_GET['name'], ENT_QUOTES, 'UTF-8');

  - id: XSS-FLASK-001
    name: "Server-side XSS via render_template_string with user input"
    category: "Cross-Site Scripting / SSTI"
    owasp: "A03:2021-Injection"
    cwe: "CWE-79"
    severity: CRITICAL
    languages: [python]
    extensions: [".py"]
    pattern: |-
      (?i)render_template_string\s*\([^)]*(request\.(args|form|values|json))
    scenario: "User input is passed directly into render_template_string (//ssti), which can lead to both XSS and, more critically, Server-Side Template Injection allowing remote code execution."
    recommendation: "Never render user input as a template. Use render_template() with a static template file and pass user data only as context variables."
    fixed_example: |
      return render_template("greeting.html", name=request.args.get("name"))

  - id: XSS-JAVA-001
