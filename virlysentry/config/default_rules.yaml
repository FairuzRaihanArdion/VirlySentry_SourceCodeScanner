version: "2.1.0"
meta:
  product: VirlySentry
  description: Default vulnerability signature database for source code scanning
  updated: "2026-07-14"
  changelog: "v2.1.0: standardized all section comments to simple inline tag format; expanded coverage with additional rules across Python, PHP, JavaScript/TypeScript, Java, Go, Ruby, C#/.NET, C/C++, and generic/IaC targets. All original v2.0.0 rules retained unchanged. Severity levels reviewed against exploit prerequisites and impact per internal risk-rating standard (see severity_rubric)."

settings:
  default_severity_threshold: LOW
  max_file_size_kb: 2048
  binary_extensions: [".png", ".jpg", ".jpeg", ".gif", ".ico", ".woff", ".woff2", ".ttf", ".zip", ".pdf", ".exe", ".dll", ".so"]
  excluded_dirs: [".git", "node_modules", "vendor", "venv", ".venv", "__pycache__", "dist", "build", ".idea", ".vscode", "coverage", "target", "bin", "obj"]
  ignore_inline_marker: "virlysentry:ignore"

# ------------------------------------------------------------------
# SEVERITY RUBRIC (internal standard — used to justify every rating below)
# CRITICAL : Unauthenticated or trivially-triggered RCE, full auth bypass,
#            or direct arbitrary data exfiltration/modification with no
#            special preconditions.
# HIGH     : Significant confidentiality/integrity/availability impact,
#            but requires some precondition (e.g. attacker must reach an
#            internal-only route, or issue is conditional on config).
# MEDIUM   : Real security weakness with limited blast radius, requires
#            chaining with another bug, or mainly affects defense-in-depth.
# LOW      : Hardening / best-practice gap; exploitability is low or
#            requires unusual circumstances.
# INFO     : Not a vulnerability by itself — a pattern that needs human
#            review because it *could* be a vulnerability in context.
# ------------------------------------------------------------------

rules:
  # //sql-injection
  - id: SQLI-PY-001
    name: "SQL Injection via string formatting (Python)"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-89"
    severity: CRITICAL
    languages: [python]
    extensions: [".py"]
    pattern: |-
      (?i)(execute|executemany)\s*\(\s*[f]?["'][^"']*["']\s*(\+|%|\.format\()
    scenario: "User-controlled input is concatenated or interpolated directly into a raw SQL query string, allowing an attacker to alter query logic (//sqli) and read, modify, or delete arbitrary database records, or bypass authentication."
    recommendation: "Use parameterized queries / prepared statements with placeholder bindings instead of string interpolation."
    fixed_example: |
      cursor.execute("SELECT * FROM users WHERE username = %s", (username,))

  - id: SQLI-PHP-001
    name: "SQL Injection via variable concatenation (PHP)"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-89"
    severity: CRITICAL
    languages: [php]
    extensions: [".php"]
    pattern: |-
      (?i)(mysqli_query|->query|pg_query)\s*\([^)]*\$(_GET|_POST|_REQUEST|_COOKIE)\b
    scenario: "A raw HTTP request parameter is passed directly into a SQL query function without sanitization or binding (//sqli), enabling attackers to manipulate the query and exfiltrate the database."
    recommendation: "Use PDO or mysqli prepared statements with bound parameters."
    fixed_example: |
      $stmt = $pdo->prepare("SELECT * FROM users WHERE id = :id");
      $stmt->execute(['id' => $id]);

  - id: SQLI-JS-001
    name: "SQL Injection via template literal (Node.js)"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-89"
    severity: CRITICAL
    languages: [javascript, typescript]
    extensions: [".js", ".ts"]
    pattern: |-
      (?i)\.(query|execute)\s*\(\s*`[^`]*\$\{
    scenario: "A template literal embeds a variable directly into a SQL query string sent to the database driver (//sqli), which allows injection of arbitrary SQL through crafted user input."
    recommendation: "Use parameterized queries provided by the driver (e.g. mysql2, pg) instead of template literals."
    fixed_example: |
      db.query("SELECT * FROM users WHERE id = ?", [id]);

  - id: SQLI-JAVA-001
    name: "SQL Injection via Statement with concatenated input (Java)"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-89"
    severity: CRITICAL
    languages: [java]
    extensions: [".java"]
    pattern: |-
      (?i)createStatement\s*\(\s*\)[\s\S]{0,80}?\.execute(Query|Update)?\s*\(\s*["'][^"']*["']\s*\+
    scenario: "A java.sql.Statement executes a query string built by concatenating a variable (//sqli), instead of using a PreparedStatement, letting an attacker inject arbitrary SQL through any tainted input reaching the concatenation."
    recommendation: "Use PreparedStatement with '?' placeholders and setX() bindings instead of Statement with string concatenation."
    fixed_example: |
      PreparedStatement ps = conn.prepareStatement("SELECT * FROM users WHERE id = ?");
      ps.setInt(1, id);

  - id: SQLI-RUBY-001
    name: "SQL Injection via unsanitized ActiveRecord where clause (Ruby on Rails)"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-89"
    severity: CRITICAL
    languages: [ruby]
    extensions: [".rb"]
    pattern: |-
      (?i)\.where\s*\(\s*["'][^"']*#\{
    scenario: "String interpolation is used inside an ActiveRecord .where() clause (//sqli), bypassing Rails' automatic parameter binding and allowing SQL injection through the interpolated value."
    recommendation: "Pass values as bind parameters, e.g. Model.where(\"name = ?\", name), instead of interpolating them into the SQL string."
    fixed_example: |
      User.where("email = ?", params[:email])

  - id: SQLI-GO-001
    name: "SQL Injection via fmt.Sprintf query building (Go)"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-89"
    severity: CRITICAL
    languages: [go]
    extensions: [".go"]
    pattern: |-
      (?i)(db|conn|tx)\.(Query|QueryRow|Exec)\s*\(\s*fmt\.Sprintf\s*\(
    scenario: "A SQL statement is assembled at runtime with fmt.Sprintf and passed to database/sql's Query/Exec (//sqli), which means any tainted value formatted into the string can alter query semantics."
    recommendation: "Use parameterized placeholders ($1, ?) supported natively by database/sql instead of building the query text with fmt.Sprintf."
    fixed_example: |
      db.Query("SELECT * FROM users WHERE id = $1", id)

  - id: SQLI-CSHARP-001
    name: "SQL Injection via concatenated SqlCommand text (C#/.NET)"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-89"
    severity: CRITICAL
    languages: [csharp]
    extensions: [".cs"]
    pattern: |-
      (?i)new\s+SqlCommand\s*\(\s*["'][^"']*["']\s*\+
    scenario: "A SqlCommand is constructed with a query string built via '+' concatenation (//sqli), which allows an attacker-controlled value inserted into the string to change the query's meaning."
    recommendation: "Use parameterized SqlCommand with SqlParameter objects instead of concatenating values into the SQL text."
    fixed_example: |
      var cmd = new SqlCommand("SELECT * FROM Users WHERE Id = @id", conn);
      cmd.Parameters.AddWithValue("@id", id);

  # //nosql-ldap-xpath-injection
  - id: NOSQLI-JS-001
    name: "NoSQL Injection via unvalidated object passed to MongoDB query (Node.js)"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-943"
    severity: HIGH
    languages: [javascript, typescript]
    extensions: [".js", ".ts"]
    pattern: |-
      (?i)\.(find|findOne|update|updateOne|deleteOne)\s*\(\s*(req\.(body|query|params)|request\.(body|query))\s*\)
    scenario: "A raw request body/query object is passed directly as a MongoDB filter (//nosqli), letting an attacker inject operators such as $ne or $gt to bypass authentication or logic checks."
    recommendation: "Whitelist and cast expected fields explicitly, and strip/reject keys starting with '$' before building the query object (e.g. with a library like mongo-sanitize)."
    fixed_example: |
      const filter = { username: String(req.body.username) };
      db.collection('users').findOne(filter);

  - id: NOSQLI-PY-001
    name: "NoSQL Injection via unvalidated dict passed to PyMongo query"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-943"
    severity: HIGH
    languages: [python]
    extensions: [".py"]
    pattern: |-
      (?i)\.(find|find_one|update_one|delete_one)\s*\(\s*(request\.(json|args|form))\s*\)
    scenario: "A Flask/Django request object is passed unmodified as a MongoDB filter (//nosqli), allowing operator injection (e.g. {\"$gt\": \"\"}) that bypasses intended query conditions."
    recommendation: "Explicitly extract and type-cast each expected field before constructing the MongoDB filter; reject any key beginning with '$'."
    fixed_example: |
      filter = {"username": str(request.json.get("username"))}
      collection.find_one(filter)

  - id: LDAPI-JAVA-001
    name: "LDAP Injection via unescaped filter concatenation (Java)"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-90"
    severity: HIGH
    languages: [java]
    extensions: [".java"]
    pattern: |-
      (?i)search\s*\(\s*[^,]+,\s*["'][^"']*["']\s*\+
    scenario: "An LDAP search filter is built by concatenating user input into the filter string (//ldapi), allowing an attacker to inject filter metacharacters and alter the query to bypass authentication or dump directory entries."
    recommendation: "Escape all user-supplied values with a proper LDAP filter encoder before inserting them into the filter, or use a parameterized LDAP query API."
    fixed_example: |
      String safeFilter = "(uid=" + Rdn.escapeValue(username) + ")";

  - id: LDAPI-PHP-001
    name: "LDAP Injection via unescaped filter concatenation (PHP)"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-90"
    severity: HIGH
    languages: [php]
    extensions: [".php"]
    pattern: |-
      (?i)ldap_search\s*\([^)]*\$_(GET|POST|REQUEST)
    scenario: "A raw HTTP parameter flows directly into ldap_search() as part of the filter (//ldapi), which can let an attacker manipulate the LDAP query logic."
    recommendation: "Escape user input with ldap_escape() before building the filter string."
    fixed_example: |
      $safe = ldap_escape($_GET['user'], "", LDAP_ESCAPE_FILTER);
      ldap_search($conn, $base, "(uid=$safe)");

  - id: XPATHI-001
    name: "XPath Injection via concatenated expression"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-643"
    severity: HIGH
    languages: [java, python, php]
    extensions: [".java", ".py", ".php"]
    pattern: |-
      (?i)(evaluate|xpath_eval|XPath::query)\s*\(\s*["'][^"']*["']\s*\+
    scenario: "An XPath expression is assembled via string concatenation with user input (//xpathi), which can be abused to bypass authentication checks or extract arbitrary nodes from the XML document."
    recommendation: "Use parameterized XPath (XPathExpression with variable bindings) instead of building expressions via string concatenation."
    fixed_example: |
      // Use XPath variable resolvers instead of concatenating raw values into the expression

  - id: LDAPI-DOTNET-001
    name: "LDAP Injection via DirectorySearcher filter concatenation (.NET)"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-90"
    severity: HIGH
    languages: [csharp]
    extensions: [".cs"]
    pattern: |-
      (?i)new\s+DirectorySearcher\s*\([^)]*["'][^"']*["']\s*\+
    scenario: "A DirectorySearcher filter string is built via '+' concatenation with external input (//ldapi), allowing an attacker to inject LDAP filter metacharacters and alter query semantics or bypass authorization."
    recommendation: "Encode every user-supplied value for LDAP filter context before concatenation, or use a vetted encoding helper."
    fixed_example: |
      string safe = filterEncode(username);
      searcher.Filter = $"(sAMAccountName={safe})";

  # //cross-site-scripting
  - id: XSS-JS-001
    name: "DOM-based XSS via innerHTML assignment"
    category: "Cross-Site Scripting"
    owasp: "A03:2021-Injection"
    cwe: "CWE-79"
    severity: HIGH
    languages: [javascript, typescript]
    extensions: [".js", ".ts", ".jsx", ".tsx"]
    pattern: |-
      \.innerHTML\s*=\s*[^;]*(location|document\.URL|req\.|params|query)
    scenario: "Attacker-controlled data (URL, query params, or request body) is written directly to innerHTML (//xss), allowing arbitrary script execution in the victim's browser session."
    recommendation: "Use textContent for plain text, or sanitize HTML using a trusted library such as DOMPurify before rendering."
    fixed_example: |
      element.textContent = userInput;
      // or
      element.innerHTML = DOMPurify.sanitize(userInput);

  - id: XSS-REACT-001
    name: "XSS via dangerouslySetInnerHTML"
    category: "Cross-Site Scripting"
    owasp: "A03:2021-Injection"
    cwe: "CWE-79"
    severity: HIGH
    languages: [javascript, typescript]
    extensions: [".jsx", ".tsx"]
    pattern: |-
      dangerouslySetInnerHTML\s*=\s*\{\{\s*__html:\s*(?!DOMPurify)
    scenario: "Unsanitized HTML is rendered directly into the DOM via React's dangerouslySetInnerHTML (//xss), bypassing React's default output escaping and enabling script injection."
    recommendation: "Sanitize the HTML with DOMPurify before assigning it to __html, or avoid raw HTML rendering entirely."
    fixed_example: |
      <div dangerouslySetInnerHTML={{ __html: DOMPurify.sanitize(content) }} />

  - id: XSS-PHP-001
    name: "Reflected XSS via unescaped echo of request data"
    category: "Cross-Site Scripting"
    owasp: "A03:2021-Injection"
    cwe: "CWE-79"
    severity: HIGH
    languages: [php]
    extensions: [".php"]
    pattern: |-
      (?i)echo\s+\$_(GET|POST|REQUEST)\b
    scenario: "Raw request input is echoed directly into the HTML response without output encoding (//xss), letting an attacker inject a malicious script via a crafted link."
    recommendation: "Escape all user-controlled output with htmlspecialchars() before rendering it into HTML."
    fixed_example: |
      echo htmlspecialchars($_GET['name'], ENT_QUOTES, 'UTF-8');

  - id: XSS-FLASK-001
    name: "Server-side XSS via render_template_string with user input"
    category: "Cross-Site Scripting / SSTI"
    owasp: "A03:2021-Injection"
    cwe: "CWE-79"
    severity: CRITICAL
    languages: [python]
    extensions: [".py"]
    pattern: |-
      (?i)render_template_string\s*\([^)]*(request\.(args|form|values|json))
    scenario: "User input is passed directly into render_template_string (//ssti), which can lead to both XSS and, more critically, Server-Side Template Injection allowing remote code execution."
    recommendation: "Never render user input as a template. Use render_template() with a static template file and pass user data only as context variables."
    fixed_example: |
      return render_template("greeting.html", name=request.args.get("name"))

  - id: XSS-JAVA-001
    name: "Reflected XSS via unescaped response writer output (Java Servlet)"
    category: "Cross-Site Scripting"
    owasp: "A03:2021-Injection"
    cwe: "CWE-79"
    severity: HIGH
    languages: [java]
    extensions: [".java"]
    pattern: |-
      (?i)getWriter\(\)\.(print|println|write)\s*\([^)]*getParameter\s*\(
    scenario: "A servlet writes an HTTP request parameter directly to the response body without encoding (//xss), allowing script injection into the rendered page."
    recommendation: "HTML-encode any user-supplied value before writing it to the response (e.g. via OWASP Java Encoder: Encode.forHtml())."
    fixed_example: |
      out.println(Encode.forHtml(request.getParameter("name")));

  - id: XSS-JQUERY-001
    name: "DOM-based XSS via jQuery .html() with untrusted data"
    category: "Cross-Site Scripting"
    owasp: "A03:2021-Injection"
    cwe: "CWE-79"
    severity: HIGH
    languages: [javascript, typescript]
    extensions: [".js", ".ts"]
    pattern: |-
      \$\([^)]*\)\.html\s*\(\s*[^;]*(location|document\.URL|req\.|params|query)
    scenario: "Attacker-influenced data (URL fragment, query string, or request data) is passed directly into jQuery's .html() method (//xss), which injects and executes the content as HTML/script in the page."
    recommendation: "Use .text() for plain text content, or sanitize any HTML string with DOMPurify before passing it to .html()."
    fixed_example: |
      $('#el').text(userInput);

  - id: XSS-GOTEMPLATE-001
    name: "Use of text/template instead of html/template for HTML output (Go)"
    category: "Cross-Site Scripting"
    owasp: "A03:2021-Injection"
    cwe: "CWE-79"
    severity: MEDIUM
    languages: [go]
    extensions: [".go"]
    pattern: |-
      (?i)"text/template"[\s\S]{0,300}?\.Execute\s*\(\s*w\s*,
    scenario: "text/template is used to render content directly to an HTTP response writer (//xss); unlike html/template, it performs no contextual auto-escaping, so any user-controlled value in the template data can inject script into the rendered page."
    recommendation: "Use html/template instead of text/template whenever rendering directly into an HTTP response."
    fixed_example: |
      import "html/template"

  # //file-inclusion-path-traversal
  - id: LFI-PHP-001
    name: "Local File Inclusion via dynamic include/require"
    category: "Broken Access Control"
    owasp: "A01:2021-Broken Access Control"
    cwe: "CWE-98"
    severity: CRITICAL
    languages: [php]
    extensions: [".php"]
    pattern: |-
      (?i)(include|include_once|require|require_once)\s*\(?\s*\$_(GET|POST|REQUEST|COOKIE)
    scenario: "A file path derived from user-controlled input is passed to a PHP include/require statement (//lfi), which can be abused to include arbitrary local files or, combined with an upload, achieve remote code execution."
    recommendation: "Never build include paths from user input. Use a fixed allow-list of template identifiers mapped to safe file paths."
    fixed_example: |
      $allowed = ['home' => 'home.php', 'about' => 'about.php'];
      $page = $allowed[$_GET['page']] ?? 'home.php';
      include __DIR__ . '/pages/' . $page;

  - id: LFI-PY-001
    name: "Path Traversal / LFI via unsanitized open() path"
    category: "Broken Access Control"
    owasp: "A01:2021-Broken Access Control"
    cwe: "CWE-22"
    severity: HIGH
    languages: [python]
    extensions: [".py"]
    pattern: |-
      (?i)open\s*\(\s*[^)]*request\.(args|form|values)\.get
    scenario: "A filesystem path is constructed directly from an HTTP request parameter and passed to open() (//lfi), allowing an attacker to traverse directories (e.g. ../../etc/passwd) and read arbitrary files."
    recommendation: "Resolve the requested filename against a fixed base directory and verify with os.path.realpath that it stays inside that directory before opening it."
    fixed_example: |
      base_dir = os.path.realpath("uploads")
      target = os.path.realpath(os.path.join(base_dir, filename))
      if not target.startswith(base_dir + os.sep):
          abort(403)

  - id: PATHTRAV-JAVA-001
    name: "Path Traversal via unsanitized File/Paths construction (Java)"
    category: "Broken Access Control"
    owasp: "A01:2021-Broken Access Control"
    cwe: "CWE-22"
    severity: HIGH
    languages: [java]
    extensions: [".java"]
    pattern: |-
      (?i)new\s+File\s*\([^)]*getParameter\s*\(
    scenario: "A java.io.File is constructed directly from an HTTP request parameter (//path-traversal), which allows directory traversal sequences to read or write files outside the intended directory."
    recommendation: "Canonicalize the resulting path and verify it is still within the intended base directory before use (File.getCanonicalPath() + prefix check)."
    fixed_example: |
      File base = new File("/var/app/uploads").getCanonicalFile();
      File target = new File(base, fileName).getCanonicalFile();
      if (!target.getPath().startsWith(base.getPath())) throw new SecurityException();

  - id: ZIPSLIP-001
    name: "Zip Slip: archive extraction without path validation"
    category: "Broken Access Control"
    owasp: "A01:2021-Broken Access Control"
    cwe: "CWE-22"
    severity: HIGH
    languages: [java, python, javascript, typescript]
    extensions: [".java", ".py", ".js", ".ts"]
    pattern: |-
      (?i)(ZipEntry|zipfile\.ZipFile|yauzl|unzipper)[\s\S]{0,120}?(extract|getName\(\)|\.write\s*\()
    scenario: "Entries from an untrusted ZIP/TAR archive are extracted using their embedded name without validating for '../' sequences (//zip-slip), allowing a malicious archive to write files outside the target extraction directory."
    recommendation: "Resolve each entry's destination path, canonicalize it, and reject any entry whose resolved path escapes the intended output directory before writing it to disk."
    fixed_example: |
      Path resolved = outputDir.resolve(entry.getName()).normalize();
      if (!resolved.startsWith(outputDir)) throw new IOException("Bad zip entry");

  - id: PATHTRAV-NODE-001
    name: "Path Traversal via unsanitized fs path built from request input (Node.js)"
    category: "Broken Access Control"
    owasp: "A01:2021-Broken Access Control"
    cwe: "CWE-22"
    severity: HIGH
    languages: [javascript, typescript]
    extensions: [".js", ".ts"]
    pattern: |-
      (?i)fs\.(readFile|readFileSync|createReadStream)\s*\(\s*[^)]*(req\.(query|params|body))
    scenario: "A filesystem path passed to an fs read function is built directly from request data (//path-traversal), allowing an attacker to supply '../' sequences and read files outside the intended directory."
    recommendation: "Resolve the requested path against a fixed base directory with path.resolve/path.normalize, and reject any result that escapes that base directory."
    fixed_example: |
      const target = path.resolve(baseDir, path.normalize(fileName));
      if (!target.startsWith(baseDir)) return res.status(403).end();

  # //ssrf
  - id: SSRF-PY-001
    name: "SSRF via unsanitized outbound request URL"
    category: "SSRF"
    owasp: "A10:2021-Server-Side Request Forgery"
    cwe: "CWE-918"
    severity: HIGH
    languages: [python]
    extensions: [".py"]
    pattern: |-
      (?i)requests\.(get|post|put|delete|head)\s*\(\s*[^)]*request\.(args|form|values|json)
    scenario: "A URL taken directly from user input is used as the target of a server-side outbound HTTP request (//ssrf), which an attacker can abuse to reach internal services, cloud metadata endpoints, or bypass network segmentation."
    recommendation: "Validate destination hosts against an allow-list and block requests to private/loopback/link-local IP ranges before making the outbound call."
    fixed_example: |
      if not is_allowed_host(parsed_url.hostname):
          raise ValueError("destination host not permitted")
      requests.get(validated_url, timeout=5)

  - id: SSRF-JS-001
    name: "SSRF via fetch/axios with user-supplied URL"
    category: "SSRF"
    owasp: "A10:2021-Server-Side Request Forgery"
    cwe: "CWE-918"
    severity: HIGH
    languages: [javascript, typescript]
    extensions: [".js", ".ts"]
    pattern: |-
      (?i)(axios|fetch)\s*\(\s*(req\.(query|body|params)|request\.(query|body))
    scenario: "The destination URL for a server-initiated HTTP request is taken directly from the incoming request (//ssrf), which can be used to pivot into internal infrastructure."
    recommendation: "Whitelist permitted destination domains/hosts and reject any URL resolving to private or reserved IP ranges before issuing the request."
    fixed_example: |
      if (!isAllowedHost(new URL(url).hostname)) throw new Error("blocked host");
      await axios.get(url);

  - id: SSRF-JAVA-001
    name: "SSRF via RestTemplate/HttpClient with user-supplied URL (Java)"
    category: "SSRF"
    owasp: "A10:2021-Server-Side Request Forgery"
    cwe: "CWE-918"
    severity: HIGH
    languages: [java]
    extensions: [".java"]
    pattern: |-
      (?i)(restTemplate\.(getForObject|postForObject|exchange)|HttpClient[\s\S]{0,40}?newRequest)\s*\(\s*getParameter\s*\(
    scenario: "An outbound HTTP call target is built directly from a request parameter (//ssrf), allowing an attacker to redirect the server's request to internal-only endpoints such as cloud metadata services."
    recommendation: "Validate the destination against an allow-list of hosts and block requests to private/reserved IP ranges before the call is made."
    fixed_example: |
      if (!allowedHosts.contains(url.getHost())) throw new SecurityException("blocked host");

  - id: SSRF-REDIRECT-001
    name: "SSRF via unvalidated redirect target (Open Redirect used server-side)"
    category: "SSRF"
    owasp: "A10:2021-Server-Side Request Forgery"
    cwe: "CWE-601"
    severity: MEDIUM
    languages: [python, javascript, typescript, php, java]
    extensions: [".py", ".js", ".ts", ".php", ".java"]
    pattern: |-
      (?i)(redirect|sendRedirect|header\s*\(\s*["']Location)\s*\(?\s*["']?\s*\+?\s*(request\.(args|form|GET|POST)|req\.(query|body)|\$_(GET|POST|REQUEST))
    scenario: "The redirect destination is taken directly from user input (//open-redirect), which attackers can abuse for phishing (redirecting through a trusted domain) or, in server-side contexts, to trigger further SSRF."
    recommendation: "Validate the redirect target against an allow-list of internal paths or trusted domains before issuing the redirect."
    fixed_example: |
      allowed = {"/dashboard", "/profile"}
      target = next_url if next_url in allowed else "/dashboard"
      return redirect(target)

  - id: SSRF-PHP-001
