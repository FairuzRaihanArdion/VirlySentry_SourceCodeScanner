  # ================= BROKEN ACCESS CONTROL =================
  - id: ACCESS-001
    name: "Missing authentication/authorization check before sensitive action"
    category: "Broken Access Control"
    owasp: "A01:2021-Broken Access Control"
    cwe: "CWE-862"
    severity: INFO
    languages: [python, javascript, typescript, php, java, go, ruby, csharp]
    extensions: [".py", ".js", ".ts", ".php", ".java", ".go", ".rb", ".cs"]
    pattern: |-
      (?i)(def|function|func|public\s+\w+)\s+(delete|remove|admin|update)_?\w*\s*\(
    scenario: "A function performing a destructive or administrative action was found; confirm it enforces an authentication/authorization check before executing (//access-control), otherwise it may allow privilege escalation or unauthorized data modification."
    recommendation: "Add an explicit authorization check (role/permission verification) at the top of the handler before performing the sensitive operation."
    fixed_example: |
      if not current_user.has_permission("delete_resource"):
          abort(403)

  - id: MASSASSIGN-001
    name: "Mass Assignment via unfiltered request body bound to model"
    category: "Broken Access Control"
    owasp: "A01:2021-Broken Access Control"
    cwe: "CWE-915"
    severity: MEDIUM
    languages: [ruby, javascript, typescript, java, csharp]
    extensions: [".rb", ".js", ".ts", ".java", ".cs"]
    pattern: |-
      (?i)(\.create\s*\(\s*(params|req\.body)\s*\)|\.update\s*\(\s*(params|req\.body)\s*\)|Model\.new\s*\(\s*params\s*\))
    scenario: "A full, unfiltered request body/params object is bound directly onto a model's create/update call (//mass-assignment), which lets an attacker set fields that were never intended to be user-controllable, such as 'role' or 'is_admin'."
    recommendation: "Explicitly whitelist the permitted attributes (e.g. Rails strong parameters, or a DTO with only the intended fields) before passing data into the model."
    fixed_example: |
      user.update(permitted_params.slice(:name, :email))

  - id: IDOR-001
    name: "Potential Insecure Direct Object Reference via ID from request without ownership check"
    category: "Broken Access Control"
    owasp: "A01:2021-Broken Access Control"
    cwe: "CWE-639"
    severity: INFO
    languages: [python, javascript, typescript, php, java, ruby]
    extensions: [".py", ".js", ".ts", ".php", ".java", ".rb"]
    pattern: |-
      (?i)(find|findById|find_by_id|get)\s*\(\s*(request\.(args|params)|req\.params|\$_(GET|POST))
    scenario: "A record is fetched using an identifier taken directly from the request (//idor); confirm the handler also verifies the current user actually owns or is authorized to access that specific record, otherwise any authenticated user could enumerate and access other users' data."
    recommendation: "After loading the record, explicitly check that it belongs to (or is otherwise accessible by) the requesting user before returning or modifying it."
    fixed_example: |
      record = Order.find(order_id)
      abort(403) unless record.user_id == current_user.id

  - id: CSRF-001
    name: "State-changing route without apparent CSRF token verification"
    category: "Broken Access Control"
    owasp: "A01:2021-Broken Access Control"
    cwe: "CWE-352"
    severity: MEDIUM
    languages: [python, php, java]
    extensions: [".py", ".php", ".java"]
    pattern: |-
      (?i)@(app\.route|PostMapping|RequestMapping)\([^)]*method[s]?\s*=\s*\[?["']?(POST|PUT|DELETE)
    scenario: "A state-changing (POST/PUT/DELETE) endpoint was found; confirm the framework's CSRF protection is enabled for it (//csrf), otherwise an attacker can trick an authenticated user's browser into submitting the request from a malicious page."
    recommendation: "Enable and require CSRF token validation on all state-changing routes (e.g. Flask-WTF CSRFProtect, Spring Security CSRF, or a custom double-submit cookie)."
    fixed_example: |
      csrf = CSRFProtect(app)  # Flask-WTF, enabled globally

  # ================= INJECTION VIA EVAL/CODE EXECUTION =================
  - id: EVAL-JS-001
    name: "Use of eval() / Function constructor on dynamic input"
    category: "Injection"
    owasp: "A03:2021-Injection"
    cwe: "CWE-95"
    severity: CRITICAL
    languages: [javascript, typescript]
    extensions: [".js", ".ts"]
    pattern: |-
      (?i)(^|[^a-zA-Z_])eval\s*\(|new\s+Function\s*\(
    scenario: "eval() or the Function constructor executes a string as code at runtime (//code-injection); if any part of that string is influenced by user input, arbitrary JavaScript execution becomes possible."
    recommendation: "Avoid eval()/Function() entirely. Use JSON.parse() for data and explicit function references instead of dynamically constructed code."
    fixed_example: |
      const data = JSON.parse(jsonString);

  - id: EVAL-PY-001
    name: "Use of eval()/exec() on dynamic input"
    category: "Injection"
    owasp: "A03:2021-Injection"
    cwe: "CWE-95"
    severity: CRITICAL
    languages: [python]
    extensions: [".py"]
    pattern: |-
      (?i)(^|[^a-zA-Z_])(eval|exec)\s*\(
    scenario: "eval()/exec() compiles and runs a string as Python code (//code-injection); any attacker influence over that string leads directly to arbitrary code execution."
    recommendation: "Replace eval()/exec() with a safe, explicit alternative such as ast.literal_eval() for data parsing, or a dispatch dictionary for command routing."
    fixed_example: |
      import ast
      value = ast.literal_eval(user_input)

  - id: PROTOPOLLUTION-001
    name: "Prototype Pollution via unguarded deep merge of user input"
    category: "Injection"
    owasp: "A03:2021-Injection"
    cwe: "CWE-1321"
    severity: HIGH
    languages: [javascript, typescript]
    extensions: [".js", ".ts"]
    pattern: |-
      (?i)(_\.merge|deepmerge|Object\.assign)\s*\(\s*[^,]+,\s*(req\.(body|query)|JSON\.parse)
    scenario: "A deep-merge utility combines an application object with an untrusted, attacker-controlled object (//prototype-pollution); a payload containing '__proto__' can pollute Object.prototype, potentially leading to denial of service or, in some code paths, remote code execution."
    recommendation: "Use a merge utility with prototype-pollution protection (or a version patched against it), and explicitly strip/reject '__proto__', 'constructor', and 'prototype' keys from untrusted input before merging."
    fixed_example: |
      const safeInput = sanitizeKeys(req.body);
      const merged = _.merge({}, defaults, safeInput);

  - id: REDOS-001
    name: "Potential Regular Expression Denial of Service (ReDoS) pattern"
    category: "Denial of Service"
    owasp: "A05:2021-Security Misconfiguration"
    cwe: "CWE-1333"
    severity: MEDIUM
    languages: [javascript, typescript, python, php, java]
    extensions: [".js", ".ts", ".py", ".php", ".java"]
    pattern: |-
      (\([^()]*[+*]\)[+*]|\([^()]*[+*][^()]*\|[^()]*[+*]\)[+*])
    scenario: "A regular expression contains nested quantifiers or overlapping alternation with repetition (//redos), a pattern known to cause catastrophic backtracking; a crafted input string can make matching take exponential time and exhaust CPU on a single request."
    recommendation: "Rewrite the regex to avoid nested/ambiguous quantifiers, add an input length cap before matching, or use a non-backtracking regex engine (e.g. RE2) for untrusted input."
    fixed_example: |
      // Rewrite (a+)+ style patterns to a single bounded quantifier, e.g. a{1,100}

  - id: VULN-DEP-001
    name: "Known-vulnerable dependency version pinned"
    category: "Vulnerable and Outdated Components"
    owasp: "A06:2021-Vulnerable and Outdated Components"
    cwe: "CWE-1104"
    severity: HIGH
    languages: [generic]
    extensions: [".txt", ".json", ".lock", ".toml"]
    pattern: |-
      (?i)"?(lodash)"?\s*[:=]\s*"?[\^~]?4\.17\.(0|1[0-9]|20)\b|"?(log4j-core)"?\s*[:=]\s*"?2\.(0|1[0-6])\.
    scenario: "The manifest pins a package version with a publicly disclosed CVE (//vulnerable-dependency) (e.g. lodash prototype pollution, Log4Shell), leaving the application exposed to known, weaponized exploits."
    recommendation: "Upgrade the dependency to a patched version and enable automated dependency scanning (e.g. Dependabot/Snyk) in CI/CD."
    fixed_example: |
      "lodash": "^4.17.21"

  # ================= AUTHENTICATION / SESSION / JWT =================
  - id: JWT-001
    name: "JWT verification accepts 'none' algorithm or skips signature check"
    category: "Identification and Authentication Failures"
    owasp: "A07:2021-Identification and Authentication Failures"
    cwe: "CWE-347"
    severity: CRITICAL
    languages: [javascript, typescript, python, php, java]
    extensions: [".js", ".ts", ".py", ".php", ".java"]
    pattern: |-
      (?i)(algorithms\s*[:=]\s*\[?\s*["']none["']|verify\s*=\s*False|jwt\.decode\s*\([^)]*verify_signature['"]?\s*:\s*False)
    scenario: "The JWT verification logic allows the 'none' algorithm or explicitly disables signature verification (//jwt-none), which lets an attacker forge a token with arbitrary claims (e.g. an admin role) that the server will accept as valid."
    recommendation: "Explicitly whitelist the expected signing algorithm(s) (e.g. RS256) on every verify call and never accept 'none' or skip signature verification."
    fixed_example: |
      jwt.decode(token, key, algorithms=["RS256"])

  - id: JWT-002
    name: "Hardcoded JWT signing secret"
    category: "Identification and Authentication Failures"
    owasp: "A07:2021-Identification and Authentication Failures"
    cwe: "CWE-321"
    severity: CRITICAL
    languages: [javascript, typescript, python, php, java]
    extensions: [".js", ".ts", ".py", ".php", ".java"]
    pattern: |-
      (?i)jwt\.(sign|encode)\s*\([^)]*["'][A-Za-z0-9_\-!@#$%^&*]{8,}["']
    scenario: "A JWT is signed using a secret literal embedded in source code (//hardcoded-jwt-secret); anyone with source access can forge arbitrary valid tokens, including ones with elevated privileges."
    recommendation: "Load the signing secret/key from an environment variable or secrets manager, and use an asymmetric algorithm (RS256/ES256) where feasible so the verification key differs from the signing key."
    fixed_example: |
      const token = jwt.sign(payload, process.env.JWT_SECRET, { algorithm: "HS256" });

  - id: AUTH-DEFAULTCREDS-001
    name: "Hardcoded default administrative credentials"
    category: "Identification and Authentication Failures"
    owasp: "A07:2021-Identification and Authentication Failures"
    cwe: "CWE-798"
    severity: CRITICAL
    languages: [python, javascript, typescript, php, java, generic]
    extensions: [".py", ".js", ".ts", ".php", ".java", ".yaml", ".yml", ".json", ".env"]
    pattern: |-
      (?i)(username|user)\s*[:=]\s*["']admin["'][\s\S]{0,80}?(password|passwd|pwd)\s*[:=]\s*["'](admin|password|123456|changeme)["']
    scenario: "A default admin/admin-style credential pair is hardcoded in source or config (//default-creds), which is one of the most commonly exploited weaknesses in automated attacks and internet-wide scanning."
    recommendation: "Remove default credentials entirely; require an administrator to set a strong password on first run, and enforce this via a setup flow rather than a shipped default."
    fixed_example: |
      # Force password set on first boot instead of shipping a default value

  - id: AUTH-RATELIMIT-001
    name: "Authentication endpoint without apparent rate limiting"
    category: "Identification and Authentication Failures"
    owasp: "A07:2021-Identification and Authentication Failures"
    cwe: "CWE-307"
    severity: MEDIUM
    languages: [python, javascript, typescript, php, java]
    extensions: [".py", ".js", ".ts", ".php", ".java"]
    pattern: |-
      (?i)@(app\.route|PostMapping)\s*\(\s*["'][^"']*(login|signin|authenticate)[^"']*["']
    scenario: "A login/authentication route was found; confirm it is protected by rate limiting or account lockout (//brute-force), otherwise it is susceptible to credential-stuffing and brute-force password guessing attacks."
    recommendation: "Apply rate limiting (per-IP and per-account) and progressive delays or lockouts to authentication endpoints, and consider CAPTCHA after repeated failures."
    fixed_example: |
      @limiter.limit("5 per minute")
      @app.route("/login", methods=["POST"])

  - id: HOSTHEADER-001
    name: "Host header used to build absolute URLs without validation"
    category: "Security Misconfiguration"
    owasp: "A05:2021-Security Misconfiguration"
    cwe: "CWE-644"
    severity: MEDIUM
    languages: [python, javascript, typescript, php, java]
    extensions: [".py", ".js", ".ts", ".php", ".java"]
    pattern: |-
      (?i)(request\.host|req\.headers\.host|\$_SERVER\['HTTP_HOST'\]|getHeader\s*\(\s*["']Host["']\s*\))[\s\S]{0,80}?(password.?reset|reset.?link|http)
    scenario: "The Host header is trusted and used to build an absolute URL, e.g. inside a password-reset email (//host-header-injection); an attacker can send a request with a forged Host header, causing the generated link to point to an attacker-controlled domain and capture reset tokens from victims."
    recommendation: "Use a fixed, server-side-configured base URL for generating links instead of trusting the incoming Host header."
    fixed_example: |
      reset_link = f"{settings.APP_BASE_URL}/reset?token={token}"

  # ================= FILE UPLOAD =================
  - id: UPLOAD-001
    name: "File upload without extension/content-type validation"
    category: "Security Misconfiguration"
    owasp: "A05:2021-Security Misconfiguration"
    cwe: "CWE-434"
    severity: HIGH
    languages: [python, javascript, typescript, php, java]
    extensions: [".py", ".js", ".ts", ".php", ".java"]
    pattern: |-
      (?i)(save|move_uploaded_file|writeFile|multer\(\s*\{)[\s\S]{0,60}?(request\.files|\$_FILES|req\.file)
    scenario: "An uploaded file is saved to disk without apparent validation of its extension, MIME type, or content (//unrestricted-upload); an attacker can upload an executable script (e.g. a .php or .jsp web shell) into a web-accessible directory and achieve remote code execution."
    recommendation: "Validate the file's extension and actual content type against an allow-list, store uploads outside the web root (or with execution disabled), and rename files to a generated identifier rather than trusting the client-supplied filename."
    fixed_example: |
      if not filename.lower().endswith((".png", ".jpg", ".pdf")):
          abort(400)
      safe_name = f"{uuid.uuid4()}{ext}"

  # ================= C / NATIVE MEMORY SAFETY =================
  - id: MEMSAFE-C-001
    name: "Use of unsafe C string function prone to buffer overflow"
    category: "Memory Safety"
    owasp: "A06:2021-Vulnerable and Outdated Components"
    cwe: "CWE-120"
    severity: HIGH
    languages: [c, cpp]
    extensions: [".c", ".cpp", ".h", ".hpp"]
    pattern: |-
      (?i)\b(strcpy|strcat|gets|sprintf)\s*\(
    scenario: "An unbounded C string function is used (//buffer-overflow); if the source data can exceed the destination buffer's size, this can corrupt adjacent memory and, in the worst case, allow arbitrary code execution via stack/heap overwrite."
    recommendation: "Use bounded equivalents (strncpy, strncat, fgets, snprintf) and always pass the destination buffer size explicitly."
    fixed_example: |
      snprintf(dest, sizeof(dest), "%s", src);

  - id: MEMSAFE-C-002
    name: "Format string vulnerability via non-literal format argument"
    category: "Memory Safety"
    owasp: "A06:2021-Vulnerable and Outdated Components"
    cwe: "CWE-134"
    severity: HIGH
    languages: [c, cpp]
    extensions: [".c", ".cpp"]
    pattern: |-
      (?i)\bprintf\s*\(\s*[a-zA-Z_]\w*\s*\)
    scenario: "printf() (or a variant) is called with a variable as the format string instead of a literal (//format-string), so if that variable's value is attacker-controlled it can be used to leak stack memory or, via %n, write arbitrary memory."
    recommendation: "Always use a constant format string, passing the variable as an argument instead: printf(\"%s\", var)."
    fixed_example: |
      printf("%s", user_supplied_string);

  # ================= GraphQL / API =================
  - id: GRAPHQL-INTROSPECTION-001
    name: "GraphQL introspection enabled without environment check"
    category: "Security Misconfiguration"
    owasp: "A05:2021-Security Misconfiguration"
    cwe: "CWE-200"
    severity: LOW
    languages: [javascript, typescript, python]
    extensions: [".js", ".ts", ".py"]
    pattern: |-
      (?i)introspection\s*:\s*true
    scenario: "GraphQL introspection is explicitly enabled (//graphql-introspection); in a production deployment this lets any client enumerate the entire schema, including internal-only types, fields, and mutations, which aids an attacker in mapping the API's attack surface."
    recommendation: "Disable introspection in production environments, gating it behind an environment-variable check (enabled only in development)."
    fixed_example: |
      introspection: process.env.NODE_ENV !== "production"

  - id: GRAPHQL-DEPTHLIMIT-001
    name: "GraphQL server without apparent query depth/complexity limiting"
    category: "Denial of Service"
    owasp: "A05:2021-Security Misconfiguration"
    cwe: "CWE-770"
    severity: MEDIUM
    languages: [javascript, typescript, python]
    extensions: [".js", ".ts", ".py"]
    pattern: |-
      (?i)new\s+(ApolloServer|GraphQLSchema)\s*\(
    scenario: "A GraphQL server is instantiated; confirm query depth/complexity limiting is configured (//graphql-dos), otherwise a deeply nested or highly repetitive query can force the server to perform exponential work and exhaust resources."
    recommendation: "Add a query complexity/depth-limiting validation rule (e.g. graphql-depth-limit, graphql-cost-analysis) to reject excessively expensive queries."
    fixed_example: |
      validationRules: [depthLimit(6)]
