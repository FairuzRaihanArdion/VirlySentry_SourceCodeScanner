  - id: ZIPSLIP-CSHARP-001
    name: "Zip Slip via ZipArchive extraction without validation (C#)"
    category: "Broken Access Control"
    owasp: "A01:2021-Broken Access Control"
    cwe: "CWE-22"
    severity: HIGH
    languages: [csharp]
