# HOST HEADER INJECTION
  - id: HOSTHEADER-001
    name: "Host header used to build absolute URLs without validation"
    category: "Security Misconfiguration"
    owasp: "A05:2021-Security Misconfiguration"
    cwe: "CWE-644"
    severity: MEDIUM
    languages: [python, javascript, typescript, php, java]
    extensions: [".py", ".js", ".ts", ".php", ".java"]
    pattern: |-
      (?i)(request\.host|req\.headers\.host|\$_SERVER\['HTTP_HOST'\]|getHeader\s*\(\s*["']Host["']\s*\))[\s\S]{0,80}?(password.?reset|reset.?link|http)
    scenario: "The Host header is trusted and used to build an absolute URL, e.g. inside a password-reset email (//host-header-injection); an attacker can send a request with a forged Host header, causing the generated link to point to an attacker-controlled domain and capture reset tokens from victims."
    recommendation: "Use a fixed, server-side-configured base URL for generating links instead of trusting the incoming Host header."
    fixed_example: |
      reset_link = f"{settings.APP_BASE_URL}/reset?token={token}"

# FILE UPLOAD
  - id: UPLOAD-001
    name: "File upload without extension/content-type validation"
    category: "Security Misconfiguration"
    owasp: "A05:2021-Security Misconfiguration"
    cwe: "CWE-434"
    severity: HIGH
    languages: [python, javascript, typescript, php, java]
    extensions: [".py", ".js", ".ts", ".php", ".java"]
    pattern: |-
      (?i)(save|move_uploaded_file|writeFile|multer\(\s*\{)[\s\S]{0,60}?(request\.files|\$_FILES|req\.file)
    scenario: "An uploaded file is saved to disk without apparent validation of its extension, MIME type, or content (//unrestricted-upload); an attacker can upload an executable script (e.g. a .php or .jsp web shell) into a web-accessible directory and achieve remote code execution."
    recommendation: "Validate the file's extension and actual content type against an allow-list, store uploads outside the web root (or with execution disabled), and rename files to a generated identifier rather than trusting the client-supplied filename."
    fixed_example: |
      if not filename.lower().endswith((".png", ".jpg", ".pdf")):
          abort(400)
      safe_name = f"{uuid.uuid4()}{ext}"

  - id: UPLOAD-GO-001
    name: "File upload without validation (Go)"
    category: "Security Misconfiguration"
    owasp: "A05:2021-Security Misconfiguration"
    cwe: "CWE-434"
    severity: HIGH
    languages: [go]
    extensions: [".go"]
    pattern: |-
      (?i)(Upload|MultipartForm).*request
    scenario: "File upload without validation (//unrestricted-upload) allows malicious files."
    recommendation: "Validate MIME type, extension, and scan file content."
    fixed_example: |
      file, header, err := r.FormFile("file")
      if !strings.HasSuffix(header.Filename, ".png") { return err }

# C / NATIVE MEMORY SAFETY
  - id: MEMSAFE-C-001
    name: "Use of unsafe C string function prone to buffer overflow"
    category: "Memory Safety"
    owasp: "A06:2021-Vulnerable and Outdated Components"
    cwe: "CWE-120"
    severity: HIGH
    languages: [c, cpp]
    extensions: [".c", ".cpp", ".h", ".hpp"]
    pattern: |-
      (?i)\b(strcpy|strcat|gets|sprintf)\s*\(
    scenario: "An unbounded C string function is used (//buffer-overflow); if the source data can exceed the destination buffer's size, this can corrupt adjacent memory and, in the worst case, allow arbitrary code execution via stack/heap overwrite."
    recommendation: "Use bounded equivalents (strncpy, strncat, fgets, snprintf) and always pass the destination buffer size explicitly."
    fixed_example: |
      snprintf(dest, sizeof(dest), "%s", src);

  - id: MEMSAFE-C-002
    name: "Format string vulnerability via non-literal format argument"
    category: "Memory Safety"
    owasp: "A06:2021-Vulnerable and Outdated Components"
    cwe: "CWE-134"
    severity: HIGH
    languages: [c, cpp]
    extensions: [".c", ".cpp"]
    pattern: |-
      (?i)\bprintf\s*\(\s*[a-zA-Z_]\w*\s*\)
    scenario: "printf() (or a variant) is called with a variable as the format string instead of a literal (//format-string), so if that variable's value is attacker-controlled it can be used to leak stack memory or, via %n, write arbitrary memory."
    recommendation: "Always use a constant format string, passing the variable as an argument instead: printf(\"%s\", var)."
    fixed_example: |
      printf("%s", user_supplied_string);

  - id: MEMSAFE-C-003
    name: "Use of malloc without null check"
    category: "Memory Safety"
    owasp: "A06:2021-Vulnerable and Outdated Components"
    cwe: "CWE-476"
    severity: LOW
    languages: [c, cpp]
    extensions: [".c", ".cpp"]
    pattern: |-
      (?i)malloc\s*\([^)]*\)
    scenario: "malloc may return NULL (//null-deref) leading to crash."
    recommendation: "Always check malloc return value for NULL."
    fixed_example: |
      char *ptr = (char*)malloc(size);
      if (!ptr) { /* handle error */ }

  - id: MEMSAFE-C-004
    name: "Free of memory not allocated by malloc"
    category: "Memory Safety"
    owasp: "A06:2021-Vulnerable and Outdated Components"
