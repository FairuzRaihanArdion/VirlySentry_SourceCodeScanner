version: "2.0.0"
meta:
  product: VirlySentry
  description: Default vulnerability signature database for source code scanning
  updated: "2026-07-14"
  changelog: "v2.0.0: expanded coverage to Java, Go, Ruby, C#/.NET, C; added NoSQL/LDAP/XPath injection, deserialization, TLS misconfig, JWT, SSRF/redirect, ReDoS, Zip Slip, mass assignment, CSRF, clickjacking, and other OWASP Top 10 / CWE Top 25 categories. Severity levels reviewed against exploit prerequisites and impact per internal risk-rating standard (see severity_rubric)."

settings:
  default_severity_threshold: LOW
  max_file_size_kb: 2048
  binary_extensions: [".png", ".jpg", ".jpeg", ".gif", ".ico", ".woff", ".woff2", ".ttf", ".zip", ".pdf", ".exe", ".dll", ".so"]
  excluded_dirs: [".git", "node_modules", "vendor", "venv", ".venv", "__pycache__", "dist", "build", ".idea", ".vscode", "coverage", "target", "bin", "obj"]
  ignore_inline_marker: "virlysentry:ignore"

# ------------------------------------------------------------------
# SEVERITY RUBRIC (internal standard — used to justify every rating below)
# CRITICAL : Unauthenticated or trivially-triggered RCE, full auth bypass,
#            or direct arbitrary data exfiltration/modification with no
#            special preconditions.
# HIGH     : Significant confidentiality/integrity/availability impact,
#            but requires some precondition (e.g. attacker must reach an
#            internal-only route, or issue is conditional on config).
# MEDIUM   : Real security weakness with limited blast radius, requires
#            chaining with another bug, or mainly affects defense-in-depth.
# LOW      : Hardening / best-practice gap; exploitability is low or
#            requires unusual circumstances.
# INFO     : Not a vulnerability by itself — a pattern that needs human
#            review because it *could* be a vulnerability in context.
# ------------------------------------------------------------------

rules:
  # ================= SQL INJECTION =================
  - id: SQLI-PY-001
    name: "SQL Injection via string formatting (Python)"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-89"
    severity: CRITICAL
    languages: [python]
    extensions: [".py"]
    pattern: |-
      (?i)(execute|executemany)\s*\(\s*[f]?["'][^"']*["']\s*(\+|%|\.format\()
    scenario: "User-controlled input is concatenated or interpolated directly into a raw SQL query string, allowing an attacker to alter query logic (//sqli) and read, modify, or delete arbitrary database records, or bypass authentication."
    recommendation: "Use parameterized queries / prepared statements with placeholder bindings instead of string interpolation."
    fixed_example: |
      cursor.execute("SELECT * FROM users WHERE username = %s", (username,))

  - id: SQLI-PHP-001
    name: "SQL Injection via variable concatenation (PHP)"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-89"
    severity: CRITICAL
    languages: [php]
    extensions: [".php"]
    pattern: |-
      (?i)(mysqli_query|->query|pg_query)\s*\([^)]*\$(_GET|_POST|_REQUEST|_COOKIE)\b
    scenario: "A raw HTTP request parameter is passed directly into a SQL query function without sanitization or binding (//sqli), enabling attackers to manipulate the query and exfiltrate the database."
    recommendation: "Use PDO or mysqli prepared statements with bound parameters."
    fixed_example: |
      $stmt = $pdo->prepare("SELECT * FROM users WHERE id = :id");
      $stmt->execute(['id' => $id]);

  - id: SQLI-JS-001
    name: "SQL Injection via template literal (Node.js)"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-89"
    severity: CRITICAL
    languages: [javascript, typescript]
    extensions: [".js", ".ts"]
    pattern: |-
      (?i)\.(query|execute)\s*\(\s*`[^`]*\$\{
    scenario: "A template literal embeds a variable directly into a SQL query string sent to the database driver (//sqli), which allows injection of arbitrary SQL through crafted user input."
    recommendation: "Use parameterized queries provided by the driver (e.g. mysql2, pg) instead of template literals."
    fixed_example: |
      db.query("SELECT * FROM users WHERE id = ?", [id]);

  - id: SQLI-JAVA-001
    name: "SQL Injection via Statement with concatenated input (Java)"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-89"
    severity: CRITICAL
    languages: [java]
    extensions: [".java"]
    pattern: |-
      (?i)createStatement\s*\(\s*\)[\s\S]{0,80}?\.execute(Query|Update)?\s*\(\s*["'][^"']*["']\s*\+
    scenario: "A java.sql.Statement executes a query string built by concatenating a variable (//sqli), instead of using a PreparedStatement, letting an attacker inject arbitrary SQL through any tainted input reaching the concatenation."
    recommendation: "Use PreparedStatement with '?' placeholders and setX() bindings instead of Statement with string concatenation."
    fixed_example: |
      PreparedStatement ps = conn.prepareStatement("SELECT * FROM users WHERE id = ?");
      ps.setInt(1, id);

  - id: SQLI-RUBY-001
    name: "SQL Injection via unsanitized ActiveRecord where clause (Ruby on Rails)"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-89"
    severity: CRITICAL
    languages: [ruby]
    extensions: [".rb"]
    pattern: |-
      (?i)\.where\s*\(\s*["'][^"']*#\{
    scenario: "String interpolation is used inside an ActiveRecord .where() clause (//sqli), bypassing Rails' automatic parameter binding and allowing SQL injection through the interpolated value."
    recommendation: "Pass values as bind parameters, e.g. Model.where(\"name = ?\", name), instead of interpolating them into the SQL string."
    fixed_example: |
      User.where("email = ?", params[:email])

  - id: SQLI-GO-001
    name: "SQL Injection via fmt.Sprintf query building (Go)"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-89"
    severity: CRITICAL
    languages: [go]
    extensions: [".go"]
    pattern: |-
      (?i)(db|conn|tx)\.(Query|QueryRow|Exec)\s*\(\s*fmt\.Sprintf\s*\(
    scenario: "A SQL statement is assembled at runtime with fmt.Sprintf and passed to database/sql's Query/Exec (//sqli), which means any tainted value formatted into the string can alter query semantics."
    recommendation: "Use parameterized placeholders ($1, ?) supported natively by database/sql instead of building the query text with fmt.Sprintf."
    fixed_example: |
      db.Query("SELECT * FROM users WHERE id = $1", id)

  - id: SQLI-CSHARP-001
    name: "SQL Injection via concatenated SqlCommand text (C#/.NET)"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-89"
    severity: CRITICAL
    languages: [csharp]
    extensions: [".cs"]
    pattern: |-
      (?i)new\s+SqlCommand\s*\(\s*["'][^"']*["']\s*\+
    scenario: "A SqlCommand is constructed with a query string built via '+' concatenation (//sqli), which allows an attacker-controlled value inserted into the string to change the query's meaning."
    recommendation: "Use parameterized SqlCommand with SqlParameter objects instead of concatenating values into the SQL text."
    fixed_example: |
      var cmd = new SqlCommand("SELECT * FROM Users WHERE Id = @id", conn);
      cmd.Parameters.AddWithValue("@id", id);

  # ================= NoSQL / LDAP / XPATH INJECTION =================
  - id: NOSQLI-JS-001
    name: "NoSQL Injection via unvalidated object passed to MongoDB query (Node.js)"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-943"
    severity: HIGH
    languages: [javascript, typescript]
    extensions: [".js", ".ts"]
    pattern: |-
      (?i)\.(find|findOne|update|updateOne|deleteOne)\s*\(\s*(req\.(body|query|params)|request\.(body|query))\s*\)
    scenario: "A raw request body/query object is passed directly as a MongoDB filter (//nosqli), letting an attacker inject operators such as $ne or $gt to bypass authentication or logic checks."
    recommendation: "Whitelist and cast expected fields explicitly, and strip/reject keys starting with '$' before building the query object (e.g. with a library like mongo-sanitize)."
    fixed_example: |
      const filter = { username: String(req.body.username) };
      db.collection('users').findOne(filter);

  - id: NOSQLI-PY-001
    name: "NoSQL Injection via unvalidated dict passed to PyMongo query"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-943"
    severity: HIGH
    languages: [python]
    extensions: [".py"]
    pattern: |-
      (?i)\.(find|find_one|update_one|delete_one)\s*\(\s*(request\.(json|args|form))\s*\)
    scenario: "A Flask/Django request object is passed unmodified as a MongoDB filter (//nosqli), allowing operator injection (e.g. {\"$gt\": \"\"}) that bypasses intended query conditions."
    recommendation: "Explicitly extract and type-cast each expected field before constructing the MongoDB filter; reject any key beginning with '$'."
    fixed_example: |
      filter = {"username": str(request.json.get("username"))}
      collection.find_one(filter)

  - id: LDAPI-JAVA-001
    name: "LDAP Injection via unescaped filter concatenation (Java)"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-90"
    severity: HIGH
    languages: [java]
    extensions: [".java"]
    pattern: |-
      (?i)search\s*\(\s*[^,]+,\s*["'][^"']*["']\s*\+
    scenario: "An LDAP search filter is built by concatenating user input into the filter string (//ldapi), allowing an attacker to inject filter metacharacters and alter the query to bypass authentication or dump directory entries."
    recommendation: "Escape all user-supplied values with a proper LDAP filter encoder before inserting them into the filter, or use a parameterized LDAP query API."
    fixed_example: |
      String safeFilter = "(uid=" + Rdn.escapeValue(username) + ")";

  - id: LDAPI-PHP-001
    name: "LDAP Injection via unescaped filter concatenation (PHP)"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-90"
    severity: HIGH
    languages: [php]
    extensions: [".php"]
    pattern: |-
      (?i)ldap_search\s*\([^)]*\$_(GET|POST|REQUEST)
    scenario: "A raw HTTP parameter flows directly into ldap_search() as part of the filter (//ldapi), which can let an attacker manipulate the LDAP query logic."
    recommendation: "Escape user input with ldap_escape() before building the filter string."
    fixed_example: |
      $safe = ldap_escape($_GET['user'], "", LDAP_ESCAPE_FILTER);
      ldap_search($conn, $base, "(uid=$safe)");

  - id: XPATHI-001
    name: "XPath Injection via concatenated expression"
    category: Injection
    owasp: "A03:2021-Injection"
    cwe: "CWE-643"
    severity: HIGH
    languages: [java, python, php]
    extensions: [".java", ".py", ".php"]
    pattern: |-
      (?i)(evaluate|xpath_eval|XPath::query)\s*\(\s*["'][^"']*["']\s*\+
    scenario: "An XPath expression is assembled via string concatenation with user input (//xpathi), which can be abused to bypass authentication checks or extract arbitrary nodes from the XML document."
    recommendation: "Use parameterized XPath (XPathExpression with variable bindings) instead of building expressions via string concatenation."
    fixed_example: |
      // Use XPath variable resolvers instead of concatenating raw values into the expression

  # ================= CROSS-SITE SCRIPTING (XSS) =================
  - id: XSS-JS-001
    name: "DOM-based XSS via innerHTML assignment"
    category: "Cross-Site Scripting"
    owasp: "A03:2021-Injection"
    cwe: "CWE-79"
    severity: HIGH
    languages: [javascript, typescript]
    extensions: [".js", ".ts", ".jsx", ".tsx"]
    pattern: |-
      \.innerHTML\s*=\s*[^;]*(location|document\.URL|req\.|params|query)
    scenario: "Attacker-controlled data (URL, query params, or request body) is written directly to innerHTML (//xss), allowing arbitrary script execution in the victim's browser session."
    recommendation: "Use textContent for plain text, or sanitize HTML using a trusted library such as DOMPurify before rendering."
    fixed_example: |
      element.textContent = userInput;
      // or
      element.innerHTML = DOMPurify.sanitize(userInput);

  - id: XSS-REACT-001
    name: "XSS via dangerouslySetInnerHTML"
    category: "Cross-Site Scripting"
    owasp: "A03:2021-Injection"
    cwe: "CWE-79"
    severity: HIGH
    languages: [javascript, typescript]
    extensions: [".jsx", ".tsx"]
    pattern: |-
      dangerouslySetInnerHTML\s*=\s*\{\{\s*__html:\s*(?!DOMPurify)
    scenario: "Unsanitized HTML is rendered directly into the DOM via React's dangerouslySetInnerHTML (//xss), bypassing React's default output escaping and enabling script injection."
    recommendation: "Sanitize the HTML with DOMPurify before assigning it to __html, or avoid raw HTML rendering entirely."
    fixed_example: |
      <div dangerouslySetInnerHTML={{ __html: DOMPurify.sanitize(content) }} />

  - id: XSS-PHP-001
    name: "Reflected XSS via unescaped echo of request data"
    category: "Cross-Site Scripting"
    owasp: "A03:2021-Injection"
    cwe: "CWE-79"
    severity: HIGH
    languages: [php]
    extensions: [".php"]
    pattern: |-
      (?i)echo\s+\$_(GET|POST|REQUEST)\b
    scenario: "Raw request input is echoed directly into the HTML response without output encoding (//xss), letting an attacker inject a malicious script via a crafted link."
    recommendation: "Escape all user-controlled output with htmlspecialchars() before rendering it into HTML."
    fixed_example: |
      echo htmlspecialchars($_GET['name'], ENT_QUOTES, 'UTF-8');

  - id: XSS-FLASK-001
    name: "Server-side XSS via render_template_string with user input"
    category: "Cross-Site Scripting / SSTI"
    owasp: "A03:2021-Injection"
    cwe: "CWE-79"
    severity: CRITICAL
    languages: [python]
    extensions: [".py"]
    pattern: |-
      (?i)render_template_string\s*\([^)]*(request\.(args|form|values|json))
    scenario: "User input is passed directly into render_template_string (//ssti), which can lead to both XSS and, more critically, Server-Side Template Injection allowing remote code execution."
    recommendation: "Never render user input as a template. Use render_template() with a static template file and pass user data only as context variables."
    fixed_example: |
      return render_template("greeting.html", name=request.args.get("name"))

  - id: XSS-JAVA-001
    name: "Reflected XSS via unescaped response writer output (Java Servlet)"
    category: "Cross-Site Scripting"
    owasp: "A03:2021-Injection"
    cwe: "CWE-79"
    severity: HIGH
    languages: [java]
    extensions: [".java"]
    pattern: |-
      (?i)getWriter\(\)\.(print|println|write)\s*\([^)]*getParameter\s*\(
    scenario: "A servlet writes an HTTP request parameter directly to the response body without encoding (//xss), allowing script injection into the rendered page."
    recommendation: "HTML-encode any user-supplied value before writing it to the response (e.g. via OWASP Java Encoder: Encode.forHtml())."
    fixed_example: |
      out.println(Encode.forHtml(request.getParameter("name")));

  # ================= LOCAL/REMOTE FILE INCLUSION & PATH TRAVERSAL =================
  - id: LFI-PHP-001
    name: "Local File Inclusion via dynamic include/require"
    category: "Broken Access Control"
    owasp: "A01:2021-Broken Access Control"
    cwe: "CWE-98"
    severity: CRITICAL
    languages: [php]
    extensions: [".php"]
    pattern: |-
      (?i)(include|include_once|require|require_once)\s*\(?\s*\$_(GET|POST|REQUEST|COOKIE)
    scenario: "A file path derived from user-controlled input is passed to a PHP include/require statement (//lfi), which can be abused to include arbitrary local files or, combined with an upload, achieve remote code execution."
    recommendation: "Never build include paths from user input. Use a fixed allow-list of template identifiers mapped to safe file paths."
    fixed_example: |
      $allowed = ['home' => 'home.php', 'about' => 'about.php'];
      $page = $allowed[$_GET['page']] ?? 'home.php';
      include __DIR__ . '/pages/' . $page;

  - id: LFI-PY-001
    name: "Path Traversal / LFI via unsanitized open() path"
    category: "Broken Access Control"
    owasp: "A01:2021-Broken Access Control"
    cwe: "CWE-22"
    severity: HIGH
    languages: [python]
    extensions: [".py"]
    pattern: |-
      (?i)open\s*\(\s*[^)]*request\.(args|form|values)\.get
    scenario: "A filesystem path is constructed directly from an HTTP request parameter and passed to open() (//lfi), allowing an attacker to traverse directories (e.g. ../../etc/passwd) and read arbitrary files."
    recommendation: "Resolve the requested filename against a fixed base directory and verify with os.path.realpath that it stays inside that directory before opening it."
    fixed_example: |
      base_dir = os.path.realpath("uploads")
      target = os.path.realpath(os.path.join(base_dir, filename))
      if not target.startswith(base_dir + os.sep):
          abort(403)

  - id: PATHTRAV-JAVA-001
    name: "Path Traversal via unsanitized File/Paths construction (Java)"
    category: "Broken Access Control"
    owasp: "A01:2021-Broken Access Control"
    cwe: "CWE-22"
    severity: HIGH
    languages: [java]
    extensions: [".java"]
    pattern: |-
      (?i)new\s+File\s*\([^)]*getParameter\s*\(
    scenario: "A java.io.File is constructed directly from an HTTP request parameter (//path-traversal), which allows directory traversal sequences to read or write files outside the intended directory."
    recommendation: "Canonicalize the resulting path and verify it is still within the intended base directory before use (File.getCanonicalPath() + prefix check)."
    fixed_example: |
      File base = new File("/var/app/uploads").getCanonicalFile();
      File target = new File(base, fileName).getCanonicalFile();
      if (!target.getPath().startsWith(base.getPath())) throw new SecurityException();

  - id: ZIPSLIP-001
    name: "Zip Slip: archive extraction without path validation"
    category: "Broken Access Control"
    owasp: "A01:2021-Broken Access Control"
    cwe: "CWE-22"
    severity: HIGH
    languages: [java, python, javascript, typescript]
    extensions: [".java", ".py", ".js", ".ts"]
    pattern: |-
      (?i)(ZipEntry|zipfile\.ZipFile|yauzl|unzipper)[\s\S]{0,120}?(extract|getName\(\)|\.write\s*\()
    scenario: "Entries from an untrusted ZIP/TAR archive are extracted using their embedded name without validating for '../' sequences (//zip-slip), allowing a malicious archive to write files outside the target extraction directory."
    recommendation: "Resolve each entry's destination path, canonicalize it, and reject any entry whose resolved path escapes the intended output directory before writing it to disk."
    fixed_example: |
      Path resolved = outputDir.resolve(entry.getName()).normalize();
      if (!resolved.startsWith(outputDir)) throw new IOException("Bad zip entry");

  # ================= SERVER-SIDE REQUEST FORGERY =================
  - id: SSRF-PY-001
    name: "SSRF via unsanitized outbound request URL"
    category: "SSRF"
    owasp: "A10:2021-Server-Side Request Forgery"
    cwe: "CWE-918"
    severity: HIGH
    languages: [python]
    extensions: [".py"]
    pattern: |-
      (?i)requests\.(get|post|put|delete|head)\s*\(\s*[^)]*request\.(args|form|values|json)
    scenario: "A URL taken directly from user input is used as the target of a server-side outbound HTTP request (//ssrf), which an attacker can abuse to reach internal services, cloud metadata endpoints, or bypass network segmentation."
    recommendation: "Validate destination hosts against an allow-list and block requests to private/loopback/link-local IP ranges before making the outbound call."
    fixed_example: |
      if not is_allowed_host(parsed_url.hostname):
          raise ValueError("destination host not permitted")
      requests.get(validated_url, timeout=5)

  - id: SSRF-JS-001
    name: "SSRF via fetch/axios with user-supplied URL"
    category: "SSRF"
    owasp: "A10:2021-Server-Side Request Forgery"
    cwe: "CWE-918"
    severity: HIGH
    languages: [javascript, typescript]
    extensions: [".js", ".ts"]
    pattern: |-
      (?i)(axios|fetch)\s*\(\s*(req\.(query|body|params)|request\.(query|body))
    scenario: "The destination URL for a server-initiated HTTP request is taken directly from the incoming request (//ssrf), which can be used to pivot into internal infrastructure."
    recommendation: "Whitelist permitted destination domains/hosts and reject any URL resolving to private or reserved IP ranges before issuing the request."
    fixed_example: |
      if (!isAllowedHost(new URL(url).hostname)) throw new Error("blocked host");
      await axios.get(url);

  - id: SSRF-JAVA-001
    name: "SSRF via RestTemplate/HttpClient with user-supplied URL (Java)"
    category: "SSRF"
    owasp: "A10:2021-Server-Side Request Forgery"
    cwe: "CWE-918"
    severity: HIGH
    languages: [java]
    extensions: [".java"]
    pattern: |-
      (?i)(restTemplate\.(getForObject|postForObject|exchange)|HttpClient[\s\S]{0,40}?newRequest)\s*\(\s*getParameter\s*\(
    scenario: "An outbound HTTP call target is built directly from a request parameter (//ssrf), allowing an attacker to redirect the server's request to internal-only endpoints such as cloud metadata services."
    recommendation: "Validate the destination against an allow-list of hosts and block requests to private/reserved IP ranges before the call is made."
    fixed_example: |
      if (!allowedHosts.contains(url.getHost())) throw new SecurityException("blocked host");

  - id: SSRF-REDIRECT-001
    name: "SSRF via unvalidated redirect target (Open Redirect used server-side)"
    category: "SSRF"
    owasp: "A10:2021-Server-Side Request Forgery"
    cwe: "CWE-601"
    severity: MEDIUM
    languages: [python, javascript, typescript, php, java]
    extensions: [".py", ".js", ".ts", ".php", ".java"]
    pattern: |-
      (?i)(redirect|sendRedirect|header\s*\(\s*["']Location)\s*\(?\s*["']?\s*\+?\s*(request\.(args|form|GET|POST)|req\.(query|body)|\$_(GET|POST|REQUEST))
    scenario: "The redirect destination is taken directly from user input (//open-redirect), which attackers can abuse for phishing (redirecting through a trusted domain) or, in server-side contexts, to trigger further SSRF."
    recommendation: "Validate the redirect target against an allow-list of internal paths or trusted domains before issuing the redirect."
    fixed_example: |
      allowed = {"/dashboard", "/profile"}
      target = next_url if next_url in allowed else "/dashboard"
      return redirect(target)

  # ================= COMMAND INJECTION =================
  - id: CMDI-PY-001
    name: "OS Command Injection via os.system/subprocess shell=True"
    category: "Injection"
    owasp: "A03:2021-Injection"
    cwe: "CWE-78"
    severity: CRITICAL
    languages: [python]
    extensions: [".py"]
    pattern: |-
      (?i)(os\.system|os\.popen|subprocess\.(call|run|Popen)\([^)]*shell\s*=\s*True)
    scenario: "User-influenced data may reach a shell command executor (//rce), letting an attacker chain shell metacharacters to execute arbitrary operating system commands."
    recommendation: "Avoid shell=True. Pass the command as a list of arguments to subprocess.run() and never interpolate user input into a shell string."
    fixed_example: |
      subprocess.run(["ping", "-c", "1", host], shell=False, check=True)

  - id: CMDI-PHP-001
    name: "OS Command Injection via shell_exec/system"
    category: "Injection"
    owasp: "A03:2021-Injection"
    cwe: "CWE-78"
    severity: CRITICAL
    languages: [php]
    extensions: [".php"]
    pattern: |-
      (?i)(shell_exec|system|passthru|exec)\s*\([^)]*\$_(GET|POST|REQUEST)
    scenario: "A user-supplied HTTP parameter flows directly into a shell execution function (//rce), allowing arbitrary command execution on the host."
    recommendation: "Avoid shelling out to user input. If unavoidable, use escapeshellarg() on every argument and prefer an allow-list of permitted commands."
    fixed_example: |
      $safe = escapeshellarg($input);
      $output = shell_exec("some_binary " . $safe);

  - id: CMDI-JS-001
    name: "OS Command Injection via child_process.exec"
    category: "Injection"
    owasp: "A03:2021-Injection"
    cwe: "CWE-78"
    severity: CRITICAL
    languages: [javascript, typescript]
    extensions: [".js", ".ts"]
    pattern: |-
      (?i)child_process\.exec\s*\(\s*[`"'][^`"']*\$\{
    scenario: "A shell command string is built by interpolating a variable directly into child_process.exec (//rce), which spawns a shell and is vulnerable to command chaining via metacharacters."
    recommendation: "Use execFile() or spawn() with an argument array instead of exec() with a concatenated string."
    fixed_example: |
      execFile("convert", [inputPath, outputPath]);

  - id: CMDI-JAVA-001
    name: "OS Command Injection via Runtime.exec/ProcessBuilder with shell wrapper"
    category: "Injection"
    owasp: "A03:2021-Injection"
    cwe: "CWE-78"
    severity: CRITICAL
    languages: [java]
    extensions: [".java"]
    pattern: |-
      (?i)Runtime\.getRuntime\(\)\.exec\s*\(\s*["']?(/bin/sh|sh|cmd(\.exe)?)\b.*(-c|/c)
    scenario: "A command is executed through a shell wrapper (sh -c / cmd /c) built from a concatenated string (//rce), allowing shell metacharacters in any tainted input to chain arbitrary commands."
    recommendation: "Use ProcessBuilder with a fixed executable and an explicit argument array, avoiding the shell wrapper entirely."
    fixed_example: |
      new ProcessBuilder("ping", "-c", "1", host).start();

  - id: CMDI-GO-001
    name: "OS Command Injection via exec.Command with shell string (Go)"
    category: "Injection"
    owasp: "A03:2021-Injection"
    cwe: "CWE-78"
    severity: CRITICAL
    languages: [go]
    extensions: [".go"]
    pattern: |-
      (?i)exec\.Command\s*\(\s*["'](/bin/sh|sh|bash)["']\s*,\s*["']-c["']
    scenario: "A shell (sh -c) is invoked with a command string that embeds external input (//rce), which allows shell metacharacters to be injected and chained into arbitrary command execution."
    recommendation: "Call exec.Command with the target binary and explicit argument list directly, without going through a shell interpreter."
    fixed_example: |
      exec.Command("ping", "-c", "1", host).Run()

  - id: CMDI-RUBY-001
    name: "OS Command Injection via system/backticks/%x with interpolation (Ruby)"
    category: "Injection"
    owasp: "A03:2021-Injection"
    cwe: "CWE-78"
    severity: CRITICAL
    languages: [ruby]
    extensions: [".rb"]
    pattern: |-
      (?i)(`[^`]*#\{|%x\{[^}]*#\{|system\s*\(\s*["'][^"']*#\{)
    scenario: "A shell command is built via string interpolation and executed with backticks, %x{}, or system() (//rce), letting attacker-controlled input inject shell metacharacters."
    recommendation: "Pass arguments as a separate array to system()/Open3.capture2() instead of interpolating them into a single shell string."
    fixed_example: |
      system("ping", "-c", "1", host)

  # ================= INSECURE DESERIALIZATION =================
  - id: DESER-PY-001
    name: "Insecure Deserialization via pickle.loads on untrusted data"
    category: "Insecure Deserialization"
    owasp: "A08:2021-Software and Data Integrity Failures"
    cwe: "CWE-502"
    severity: CRITICAL
    languages: [python]
    extensions: [".py"]
    pattern: |-
      (?i)pickle\.(loads|load)\s*\(
    scenario: "pickle.loads deserializes untrusted byte streams (//deser), and a crafted payload can execute arbitrary code during unpickling."
    recommendation: "Never unpickle data from an untrusted source. Use a safe format such as JSON, or cryptographically sign/verify the payload before unpickling."
    fixed_example: |
      data = json.loads(payload)

  - id: DESER-PY-002
    name: "Unsafe YAML load allowing arbitrary object construction"
    category: "Insecure Deserialization"
    owasp: "A08:2021-Software and Data Integrity Failures"
    cwe: "CWE-502"
    severity: HIGH
    languages: [python]
    extensions: [".py"]
    pattern: |-
      (?i)yaml\.load\s*\((?!.*Loader\s*=\s*yaml\.SafeLoader)
    scenario: "yaml.load() without an explicit SafeLoader can instantiate arbitrary Python objects from the YAML document (//deser), leading to remote code execution when the file is attacker-influenced."
    recommendation: "Always use yaml.safe_load() or explicitly pass Loader=yaml.SafeLoader."
    fixed_example: |
      data = yaml.safe_load(stream)

  - id: DESER-PHP-001
    name: "PHP Object Injection via unserialize on user input"
    category: "Insecure Deserialization"
    owasp: "A08:2021-Software and Data Integrity Failures"
    cwe: "CWE-502"
    severity: CRITICAL
    languages: [php]
    extensions: [".php"]
    pattern: |-
      (?i)unserialize\s*\(\s*\$_(GET|POST|REQUEST|COOKIE)
    scenario: "User-controlled data is passed to unserialize() (//deser), which can trigger PHP Object Injection and, via a suitable gadget chain, arbitrary code execution."
    recommendation: "Use json_decode()/json_encode() for data interchange instead of PHP native serialization when the source is untrusted."
    fixed_example: |
      $data = json_decode($_POST['payload'], true);

  - id: DESER-JAVA-001
    name: "Insecure Deserialization via ObjectInputStream.readObject on untrusted data"
    category: "Insecure Deserialization"
    owasp: "A08:2021-Software and Data Integrity Failures"
    cwe: "CWE-502"
    severity: CRITICAL
    languages: [java]
    extensions: [".java"]
    pattern: |-
      (?i)new\s+ObjectInputStream\s*\([\s\S]{0,80}?\)\s*\.\s*readObject\s*\(\)
    scenario: "Native Java deserialization is applied to a byte stream (//deser); if that stream can be influenced by an attacker, a crafted object graph using known gadget chains (e.g. Commons Collections) can achieve remote code execution."
    recommendation: "Avoid native Java deserialization for untrusted data. Use a safe data format such as JSON, or a look-ahead deserialization filter (ObjectInputFilter) restricted to an allow-list of classes."
    fixed_example: |
      ObjectInputFilter filter = ObjectInputFilter.Config.createFilter("com.app.dto.*;!*");
      ois.setObjectInputFilter(filter);

  - id: DESER-RUBY-001
    name: "Insecure Deserialization via Marshal.load on untrusted data (Ruby)"
    category: "Insecure Deserialization"
    owasp: "A08:2021-Software and Data Integrity Failures"
    cwe: "CWE-502"
    severity: CRITICAL
    languages: [ruby]
    extensions: [".rb"]
    pattern: |-
      (?i)Marshal\.load\s*\(
    scenario: "Marshal.load reconstructs arbitrary Ruby objects from a byte stream (//deser); a crafted payload from an untrusted source can trigger remote code execution via known gadget chains."
    recommendation: "Never Marshal.load data from an untrusted source. Use JSON for data interchange, or Psych.safe_load for YAML."
    fixed_example: |
      data = JSON.parse(payload)

  - id: DESER-CSHARP-001
    name: "Insecure Deserialization via BinaryFormatter (.NET)"
    category: "Insecure Deserialization"
    owasp: "A08:2021-Software and Data Integrity Failures"
    cwe: "CWE-502"
    severity: CRITICAL
    languages: [csharp]
    extensions: [".cs"]
    pattern: |-
      (?i)new\s+BinaryFormatter\s*\(\s*\)[\s\S]{0,60}?\.Deserialize\s*\(
    scenario: "BinaryFormatter.Deserialize is used on a data stream (//deser); Microsoft has documented this type as inherently unsafe for untrusted input because crafted payloads can execute arbitrary code during deserialization."
    recommendation: "Migrate away from BinaryFormatter entirely; use System.Text.Json or a serializer that does not support type instantiation from the payload."
    fixed_example: |
      var data = JsonSerializer.Deserialize<MyDto>(json);

  # ================= WEAK CRYPTOGRAPHY / SECRETS =================
  - id: CRYPTO-001
    name: "Use of weak hash algorithm for password storage"
    category: "Cryptographic Failures"
    owasp: "A02:2021-Cryptographic Failures"
    cwe: "CWE-327"
    severity: HIGH
    languages: [python, php, javascript, typescript, java]
    extensions: [".py", ".php", ".js", ".ts", ".java"]
    pattern: |-
      (?i)(md5|sha1)\s*\([^)]*(password|passwd|pwd|secret)
    scenario: "MD5/SHA-1 are fast, unsalted, and considered cryptographically broken for password hashing (//weak-crypto), making offline brute-force and rainbow-table attacks practical."
    recommendation: "Use a purpose-built password hashing algorithm such as bcrypt, scrypt, or Argon2 with a per-user salt."
    fixed_example: |
      hashed = bcrypt.hashpw(password.encode(), bcrypt.gensalt())

  - id: SECRET-001
    name: "Hardcoded credential or API key"
    category: "Cryptographic Failures"
    owasp: "A02:2021-Cryptographic Failures"
    cwe: "CWE-798"
    severity: CRITICAL
    languages: [python, php, javascript, typescript, java, go, ruby, csharp, generic]
    extensions: [".py", ".php", ".js", ".ts", ".java", ".go", ".rb", ".cs", ".env", ".yaml", ".yml", ".json"]
    pattern: |-
      (?i)(api[_-]?key|secret[_-]?key|access[_-]?token|aws_secret_access_key|private_key)\s*[:=]\s*["''][A-Za-z0-9/\+_\-]{16,}["'']
    scenario: "A credential or API key is hardcoded directly in source (//hardcoded-secret), exposing it to anyone with repository access and to CI/CD logs, forks, or leaked artifacts."
    recommendation: "Move secrets to environment variables or a secrets manager (e.g. Vault, AWS Secrets Manager) and load them at runtime; rotate any credential that was ever committed."
    fixed_example: |
      api_key = os.environ["API_KEY"]

  - id: CRYPTO-PY-002
    name: "Use of insecure pseudo-random generator for security tokens"
    category: "Cryptographic Failures"
    owasp: "A02:2021-Cryptographic Failures"
    cwe: "CWE-338"
    severity: MEDIUM
    languages: [python]
    extensions: [".py"]
    pattern: |-
      (?i)random\.(random|randint|choice)\s*\([^)]*\).*(token|session|password|otp)
    scenario: "The standard random module is not cryptographically secure (//weak-random); tokens or session identifiers generated with it can be predicted by an attacker."
    recommendation: "Use the secrets module for any security-sensitive random value."
    fixed_example: |
      token = secrets.token_urlsafe(32)

  - id: CRYPTO-JAVA-001
    name: "Use of java.util.Random for security-sensitive tokens"
    category: "Cryptographic Failures"
    owasp: "A02:2021-Cryptographic Failures"
    cwe: "CWE-338"
    severity: MEDIUM
    languages: [java]
    extensions: [".java"]
    pattern: |-
      (?i)new\s+Random\s*\(\s*\)[\s\S]{0,60}?(token|session|password|otp|reset)
    scenario: "java.util.Random uses a predictable linear-congruential algorithm (//weak-random); an attacker who observes some outputs can predict future tokens generated for sessions, passwords, or OTPs."
    recommendation: "Use java.security.SecureRandom for any value with a security purpose."
    fixed_example: |
      SecureRandom random = new SecureRandom();

  - id: CRYPTO-TLS-001
    name: "TLS certificate verification disabled"
    category: "Cryptographic Failures"
    owasp: "A02:2021-Cryptographic Failures"
    cwe: "CWE-295"
    severity: HIGH
    languages: [python, javascript, typescript, java]
    extensions: [".py", ".js", ".ts", ".java"]
    pattern: |-
      (?i)(verify\s*=\s*False|rejectUnauthorized\s*:\s*false|NODE_TLS_REJECT_UNAUTHORIZED\s*=\s*['"]0['"]|trustAllCerts|X509TrustManager\(\)\s*\{)
    scenario: "TLS/SSL certificate validation is explicitly disabled (//tls-verify-disabled), which allows a man-in-the-middle attacker to intercept and tamper with traffic that the application believes is protected by HTTPS."
    recommendation: "Never disable certificate verification in production. If a custom CA is needed, load it into the trust store instead of bypassing validation entirely."
    fixed_example: |
      requests.get(url, verify=True)  # or verify="/path/to/custom-ca.pem"

  - id: CRYPTO-TLS-002
    name: "Obsolete/weak TLS protocol version explicitly configured"
    category: "Cryptographic Failures"
    owasp: "A02:2021-Cryptographic Failures"
    cwe: "CWE-326"
    severity: MEDIUM
    languages: [python, javascript, typescript, java, generic]
    extensions: [".py", ".js", ".ts", ".java", ".conf", ".yaml", ".yml"]
    pattern: |-
      (?i)(SSLv2|SSLv3|TLSv1\.0|TLSv1\.1|PROTOCOL_SSLv3|PROTOCOL_TLSv1\b)
    scenario: "The application explicitly pins a deprecated TLS/SSL protocol version (//weak-tls) known to be vulnerable to attacks such as POODLE or BEAST, weakening transport confidentiality even if the rest of the TLS config is sound."
    recommendation: "Configure a minimum of TLS 1.2, preferably TLS 1.3, and remove any explicit downgrade to older protocol versions."
    fixed_example: |
      context = ssl.SSLContext(ssl.PROTOCOL_TLS_CLIENT)
      context.minimum_version = ssl.TLSVersion.TLSv1_2

  # ================= XXE =================
  - id: XXE-PY-001
    name: "XML External Entity (XXE) via unsafe XML parser"
    category: "XXE"
    owasp: "A05:2021-Security Misconfiguration"
    cwe: "CWE-611"
    severity: HIGH
    languages: [python]
    extensions: [".py"]
    pattern: |-
      (?i)xml\.etree\.ElementTree\.(parse|fromstring)\s*\(
    scenario: "The standard library XML parser resolves external entities by default (//xxe), which can be abused to read local files or perform SSRF through a malicious XML payload."
    recommendation: "Parse untrusted XML using the defusedxml library instead of xml.etree.ElementTree."
    fixed_example: |
      from defusedxml.ElementTree import parse
      tree = parse(xml_source)

  - id: XXE-PHP-001
    name: "XXE via libxml external entity loading"
    category: "XXE"
    owasp: "A05:2021-Security Misconfiguration"
    cwe: "CWE-611"
    severity: HIGH
    languages: [php]
    extensions: [".php"]
    pattern: |-
      (?i)simplexml_load_string\s*\([^)]*\)(?!.*LIBXML_NOENT)
    scenario: "Loading XML without disabling external entity resolution (//xxe) allows an attacker-supplied DOCTYPE to read local files or trigger SSRF requests."
    recommendation: "Disable external entity loading explicitly (libxml_disable_entity_loader(true) on PHP < 8, and avoid LIBXML_NOENT with untrusted DTDs)."
    fixed_example: |
      libxml_disable_entity_loader(true);
      $xml = simplexml_load_string($data);

  - id: XXE-JAVA-001
    name: "XXE via DocumentBuilderFactory without secure processing"
    category: "XXE"
    owasp: "A05:2021-Security Misconfiguration"
    cwe: "CWE-611"
    severity: HIGH
    languages: [java]
    extensions: [".java"]
    pattern: |-
      (?i)DocumentBuilderFactory\.newInstance\s*\(\s*\)(?!.{0,300}(FEATURE_SECURE_PROCESSING|setExpandEntityReferences\s*\(\s*false\s*\)|disallow-doctype-decl))
    scenario: "DocumentBuilderFactory is instantiated without disabling DOCTYPE/external entity processing (//xxe), leaving the parser vulnerable to XXE payloads that read local files, perform SSRF, or cause denial of service via entity expansion."
    recommendation: "Explicitly disable DTDs and external entities on the factory before parsing any untrusted XML."
    fixed_example: |
      dbf.setFeature("http://apache.org/xml/features/disallow-doctype-decl", true);

  - id: XXE-CSHARP-001
    name: "XXE via XmlDocument with default resolver (.NET)"
    category: "XXE"
    owasp: "A05:2021-Security Misconfiguration"
    cwe: "CWE-611"
    severity: HIGH
    languages: [csharp]
    extensions: [".cs"]
    pattern: |-
      (?i)new\s+XmlDocument\s*\(\s*\)(?!.{0,200}XmlResolver\s*=\s*null)
    scenario: "An XmlDocument is created without setting XmlResolver to null (//xxe), which on older .NET Framework versions allows external entity resolution and can lead to local file disclosure or SSRF."
    recommendation: "Set XmlResolver to null (or use XmlReaderSettings with DtdProcessing.Prohibit) before loading untrusted XML."
    fixed_example: |
      var doc = new XmlDocument { XmlResolver = null };

  # ================= SECURITY MISCONFIGURATION =================
  - id: MISCONF-FLASK-001
    name: "Flask application running with debug mode enabled"
    category: "Security Misconfiguration"
    owasp: "A05:2021-Security Misconfiguration"
    cwe: "CWE-489"
    severity: HIGH
    languages: [python]
    extensions: [".py"]
    pattern: |-
      (?i)app\.run\s*\([^)]*debug\s*=\s*True
    scenario: "Flask's debug mode exposes the Werkzeug interactive debugger (//debug-exposed), which allows arbitrary Python code execution if reached by an attacker in production."
    recommendation: "Disable debug mode in production and control it through an environment-based configuration flag."
    fixed_example: |
      app.run(debug=os.environ.get("FLASK_DEBUG", "false") == "true")

  - id: MISCONF-DJANGO-001
    name: "Django DEBUG setting enabled"
    category: "Security Misconfiguration"
    owasp: "A05:2021-Security Misconfiguration"
    cwe: "CWE-489"
    severity: HIGH
    languages: [python]
    extensions: [".py"]
    pattern: |-
      (?im)^\s*DEBUG\s*=\s*True\s*$
    scenario: "DEBUG=True in a Django settings file leaks stack traces, environment variables, and internal paths to any visitor when an unhandled exception occurs (//debug-exposed)."
    recommendation: "Set DEBUG based on an environment variable and default to False."
    fixed_example: |
      DEBUG = os.environ.get("DJANGO_DEBUG", "False") == "True"

  - id: MISCONF-CORS-001
    name: "Overly permissive CORS policy (wildcard origin)"
    category: "Security Misconfiguration"
    owasp: "A05:2021-Security Misconfiguration"
    cwe: "CWE-942"
    severity: MEDIUM
    languages: [python, javascript, typescript, php]
    extensions: [".py", ".js", ".ts", ".php"]
    pattern: |-
      (?i)(Access-Control-Allow-Origin|cors\(\s*\{\s*origin)\s*[:=,]?\s*["'\*]\*
    scenario: "A wildcard CORS origin allows any website to make authenticated cross-origin requests to this API (//cors-wildcard), which can lead to sensitive data exfiltration when combined with credentialed requests."
    recommendation: "Restrict Access-Control-Allow-Origin to an explicit allow-list of trusted origins."
    fixed_example: |
      response.headers["Access-Control-Allow-Origin"] = "https://trusted.example.com"

  - id: MISCONF-CORS-002
    name: "CORS wildcard origin combined with credentials allowed"
    category: "Security Misconfiguration"
    owasp: "A05:2021-Security Misconfiguration"
    cwe: "CWE-942"
    severity: HIGH
    languages: [python, javascript, typescript, php]
    extensions: [".py", ".js", ".ts", ".php"]
    pattern: |-
      (?i)Access-Control-Allow-Credentials\s*[:=]\s*["']?true["']?[\s\S]{0,200}?Access-Control-Allow-Origin\s*[:=]\s*["']?\*
    scenario: "Allow-Credentials:true is paired with a wildcard Allow-Origin (//cors-credentials-wildcard); while most browsers reject this exact combination, misconfigured proxies or reflected-origin logic can effectively recreate it, letting any origin make authenticated requests and read the response, including session cookies' effects."
    recommendation: "Never combine wildcard origins with credentialed CORS. Reflect only an explicitly allow-listed origin when Allow-Credentials is true."
    fixed_example: |
      if origin in ALLOWED_ORIGINS:
          response.headers["Access-Control-Allow-Origin"] = origin
          response.headers["Access-Control-Allow-Credentials"] = "true"

  - id: MISCONF-COOKIE-001
    name: "Session cookie missing Secure/HttpOnly flags"
    category: "Security Misconfiguration"
    owasp: "A05:2021-Security Misconfiguration"
    cwe: "CWE-614"
    severity: MEDIUM
    languages: [javascript, typescript, python, php]
    extensions: [".js", ".ts", ".py", ".php"]
    pattern: |-
      (?i)(set-cookie|setCookie|session\.cookie)[^\n]*(?!.*(Secure|HttpOnly))
    scenario: "A session cookie is set without the Secure and HttpOnly flags (//insecure-cookie), leaving it exposed to interception over plaintext HTTP and to theft via client-side script injection (XSS)."
    recommendation: "Set both HttpOnly and Secure (and SameSite) attributes on any cookie carrying session or authentication data."
    fixed_example: |
      res.cookie("session_id", token, { httpOnly: true, secure: true, sameSite: "strict" });

  - id: MISCONF-COOKIE-002
    name: "SameSite=None cookie without Secure flag"
    category: "Security Misconfiguration"
    owasp: "A05:2021-Security Misconfiguration"
    cwe: "CWE-1275"
    severity: MEDIUM
    languages: [javascript, typescript, python, php]
    extensions: [".js", ".ts", ".py", ".php"]
    pattern: |-
      (?i)SameSite\s*[:=]\s*["']?None["']?(?!.{0,60}Secure)
    scenario: "SameSite=None is set without the Secure attribute (//samesite-none-insecure); modern browsers reject such cookies, but the misconfiguration usually signals the cookie is unintentionally exposed to cross-site contexts without adequate transport protection."
    recommendation: "Always pair SameSite=None with Secure, and confirm cross-site cookie use is actually required before relaxing SameSite."
    fixed_example: |
      res.cookie("token", value, { sameSite: "none", secure: true });

  - id: MISCONF-CSP-001
    name: "Missing or overly permissive Content-Security-Policy"
    category: "Security Misconfiguration"
    owasp: "A05:2021-Security Misconfiguration"
    cwe: "CWE-1021"
    severity: LOW
    languages: [javascript, typescript, python, php, generic]
    extensions: [".js", ".ts", ".py", ".php", ".conf"]
    pattern: |-
      (?i)Content-Security-Policy[^\n]*(unsafe-inline|unsafe-eval|\*)
    scenario: "The Content-Security-Policy header allows unsafe-inline, unsafe-eval, or a wildcard source (//weak-csp), which significantly weakens CSP's ability to mitigate XSS by permitting inline or arbitrary-origin script execution."
    recommendation: "Remove unsafe-inline/unsafe-eval and scope each directive to an explicit list of trusted origins; use nonces or hashes for any necessary inline scripts."
    fixed_example: |
      Content-Security-Policy: script-src 'self' 'nonce-<random>'

  - id: MISCONF-CLICKJACK-001
    name: "Missing clickjacking protection (X-Frame-Options / frame-ancestors)"
    category: "Security Misconfiguration"
    owasp: "A05:2021-Security Misconfiguration"
    cwe: "CWE-1021"
    severity: LOW
    languages: [python, javascript, typescript, php, java, generic]
    extensions: [".py", ".js", ".ts", ".php", ".java", ".conf"]
    pattern: |-
      (?i)(X-Frame-Options|frame-ancestors)
    scenario: "This signature flags files where X-Frame-Options or a CSP frame-ancestors directive is referenced; confirm one of them is actually being *set* on every HTML response (//clickjacking) — its absence lets an attacker embed the page in a hidden iframe and trick users into clicking UI elements."
    recommendation: "Set X-Frame-Options: DENY (or SAMEORIGIN) and/or Content-Security-Policy: frame-ancestors 'none' on all HTML responses that don't need to be framed."
    fixed_example: |
      response.headers["X-Frame-Options"] = "DENY"

  # ================= SSTI (generic Jinja2 / other engines) =================
  - id: SSTI-PY-002
    name: "Server-Side Template Injection via string-built template"
    category: "Injection"
    owasp: "A03:2021-Injection"
    cwe: "CWE-1336"
    severity: CRITICAL
    languages: [python]
    extensions: [".py"]
    pattern: |-
      (?i)Template\s*\(\s*[f]?["'].*\{.*request\.
    scenario: "A Jinja2 Template object is constructed from a string that embeds request data (//ssti), allowing an attacker to inject template syntax and achieve remote code execution."
    recommendation: "Never build template source strings from user input; load templates from static files and pass user data only as render context."
    fixed_example: |
      template = env.get_template("page.html")
      template.render(name=request.args.get("name"))

  - id: SSTI-JAVA-001
    name: "Spring Expression Language (SpEL) Injection"
    category: "Injection"
    owasp: "A03:2021-Injection"
    cwe: "CWE-917"
    severity: CRITICAL
    languages: [java]
    extensions: [".java"]
    pattern: |-
      (?i)(new\s+SpelExpressionParser\(\)|ExpressionParser)[\s\S]{0,120}?\.parseExpression\s*\([^)]*getParameter\s*\(
    scenario: "A Spring Expression Language string built from an HTTP request parameter is parsed and evaluated (//ssti), which allows an attacker to inject arbitrary SpEL expressions and typically achieve remote code execution."
    recommendation: "Never evaluate SpEL expressions built from untrusted input. If dynamic expressions are required, use a restricted SimpleEvaluationContext with a strict allow-list."
    fixed_example: |
